<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Things</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
:root {
  --accent:#4B8EF7; --accent-soft:#EBF3FF;
  --green:#34C759; --red:#FF3B30; --orange:#FF9500;
  --bg:#F2F2F7; --surface:#FFFFFF;
  --text:#1C1C1E; --text2:#6B6B6B; --text3:#AEAEB2;
  --border:#E5E5EA; --radius:10px;
  --sw:240px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);font-family:'Lora',serif;}
body{-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#D1D1D6;border-radius:2px;}
textarea,input{font-family:inherit;}
textarea:focus,input:focus{outline:none;}
textarea::placeholder,input::placeholder{color:var(--text3);}
button{font-family:'DM Mono',monospace;cursor:pointer;border:none;}
input[type=date]::-webkit-calendar-picker-indicator{opacity:.5;cursor:pointer;}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes checkPop{0%{transform:scale(1)}40%{transform:scale(1.25)}70%{transform:scale(.9)}100%{transform:scale(1)}}
@keyframes taskOut{0%{opacity:1;max-height:80px;transform:translateX(0)}60%{opacity:.2;transform:translateX(6px)}100%{opacity:0;max-height:0;padding-top:0;padding-bottom:0;margin:0;overflow:hidden}}
.area-menu-btn{transition:opacity .15s;}
div:hover>.area-menu-btn, div:hover > div > .area-menu-btn{opacity:1!important;}

.fade{animation:fadeIn .18s ease;}
.sheet{animation:slideUp .28s cubic-bezier(.34,1.56,.64,1);}

/* Layout */
.shell{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:var(--sw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10;transition:transform .25s ease;overflow-y:auto;}
.main{flex:1;margin-left:var(--sw);display:flex;flex-direction:column;overflow:hidden;transition:margin .25s ease;}
@media(max-width:660px){
  .sidebar{transform:translateX(calc(-1 * var(--sw)));}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .mob-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:9;animation:fadeIn .18s ease;}
}
@media(min-width:661px){.hamburger{display:none!important;}}

/* Sidebar items */
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border:none;border-radius:8px;background:transparent;cursor:pointer;text-align:left;transition:background .1s;}
.nav-btn:hover{background:var(--bg);}
.nav-btn.active{background:var(--accent-soft);}
.nav-btn .lbl{flex:1;font-size:14px;font-family:'Lora',serif;}
.nav-btn.active .lbl{color:var(--accent);}
.nav-btn .cnt{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);font-weight:600;}
.nav-btn.active .cnt{color:var(--accent);}

/* Task rows */
.task-row{display:flex;align-items:flex-start;gap:12px;padding:8px 16px;cursor:pointer;border-radius:8px;transition:background .1s;}
.task-row:hover{background:#FAFAFA;}
.task-completing{animation:taskOut .38s ease forwards;}

/* Sheets / overlays */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .18s ease;}
.sheet-box{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;}
.handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:14px auto 0;flex-shrink:0;}
.sh-hdr{padding:14px 20px 12px;border-bottom:1px solid #F2F2F7;flex-shrink:0;}
.sh-body{flex:1;overflow-y:auto;padding:18px 20px;-webkit-overflow-scrolling:touch;}
.sh-foot{padding:10px 20px 32px;border-top:1px solid #F2F2F7;flex-shrink:0;}

/* Inputs */
.inp{width:100%;border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;font-size:15px;color:var(--text);background:#FAFAFA;}
.inp:focus{border-color:#9CA3AF;background:#fff;}

/* Mini buttons */
.mini-btn{background:#F2F2F7;border:none;border-radius:5px;width:24px;height:24px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Primary button */
.btn-primary{background:var(--accent);border:none;border-radius:var(--radius);padding:12px;color:#fff;font-size:12px;font-family:'DM Mono',monospace;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;width:100%;}
.btn-primary:disabled{background:var(--bg);color:var(--text3);cursor:default;}
.btn-ghost{background:var(--bg);border:none;border-radius:var(--radius);padding:12px;color:var(--text2);font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;}

/* FAB */
.fab{height:48px;border-radius:24px;border:none;color:#fff;font-size:12px;font-family:'DM Mono',monospace;font-weight:500;letter-spacing:.04em;box-shadow:0 4px 16px rgba(0,0,0,.15);cursor:pointer;display:flex;align-items:center;gap:7px;padding:0 18px;white-space:nowrap;transition:transform .12s;}
.fab:active{transform:scale(.96);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// ── Constants ─────────────────────────────────────────────────────────────────
const SK={tasks:'th3_t',projects:'th3_p',areas:'th3_a',headings:'th3_h',settings:'th3_s'};
const DRIVE_FILE='things-app-v1.json';
const DRIVE_SCOPE='https://www.googleapis.com/auth/drive.file';
const COLORS=['#4B8EF7','#FF6B6B','#FF9500','#34C759','#AF52DE','#00C7BE','#FF2D55','#5856D6','#8E8E93','#FF6E40'];

// ── Helpers ───────────────────────────────────────────────────────────────────
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const todayStr=()=>new Date().toISOString().slice(0,10);
const addDays=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
const fmtDate=iso=>{
  if(!iso)return'';
  const d=new Date(iso+'T00:00:00'),t=new Date(todayStr()+'T00:00:00');
  const diff=Math.round((d-t)/86400000);
  if(diff===0)return'Today';if(diff===1)return'Tomorrow';if(diff===-1)return'Yesterday';
  if(diff<0)return`${Math.abs(diff)}d overdue`;
  if(diff<7)return d.toLocaleDateString('en-GB',{weekday:'long'});
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
};
const isOverdue=iso=>iso&&iso<todayStr();
const ls={
  get:(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};

// ── Claude API ────────────────────────────────────────────────────────────────
async function ai(apiKey,messages,system,max=1200){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:max,system,messages}),
  });
  const d=await r.json();
  if(d.error){
    const msg=d.error.message||'';
    if(d.error.type==='overloaded_error'||msg.toLowerCase().includes('overload'))throw new Error('API is busy — wait a moment and try again.');
    if(d.error.type==='authentication_error')throw new Error('Invalid API key — check Settings.');
    if(d.error.type==='rate_limit_error')throw new Error('Rate limit hit — wait a few seconds.');
    throw new Error(msg||'API error — try again.');
  }
  return d.content?.find(b=>b.type==='text')?.text||'';
}

async function planProject(apiKey,title,description){
  const raw=await ai(apiKey,
    [{role:'user',content:`Project: "${title}"\n\n${description}`}],
    `Break this project into actionable tasks. Return ONLY a JSON array, no markdown:
[{"heading":string|null,"tasks":["Task title",...]}]
- Use heading:null for ungrouped tasks
- Max 3 sections, 6 tasks each. Tasks must be specific and actionable.
- Planning tasks are valid: "Research options", "Draft plan", "Define requirements"`,1400);
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

async function aiSuggestChecklist(apiKey,taskTitle){
  const raw=await ai(apiKey,
    [{role:'user',content:`Task: "${taskTitle}"`}],
    'Suggest 3-5 checklist sub-steps for this task. Return ONLY a JSON array of short strings. No markdown.',400);
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

async function parseDump(apiKey,text){
  const raw=await ai(apiKey,
    [{role:'user',content:text}],
    `Extract items from a brain dump. Today is ${todayStr()}.
Return ONLY a JSON array, no markdown:
[{"title":string,"section":"inbox"|"anytime"|"someday","when":"YYYY-MM-DD"|null,"indent":0|1}]
indent 1 = sub-item of previous item. when = only if urgency clearly implied.`,1400);
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

// ── Google Drive ──────────────────────────────────────────────────────────────
let tokenClient=null,gToken=null,driveFileId=null;
async function driveReq(m,url,body){
  const h={Authorization:`Bearer ${gToken}`};
  if(body&&!(body instanceof FormData))h['Content-Type']='application/json';
  const r=await fetch(url,{method:m,headers:h,body:body?(body instanceof FormData?body:JSON.stringify(body)):undefined});
  if(!r.ok){const e=await r.json().catch(()=>{});throw new Error(e?.error?.message||`HTTP ${r.status}`);}
  return r.headers.get('content-type')?.includes('json')?r.json():r.text();
}
async function loadFromDrive(){
  const q=encodeURIComponent(`name='${DRIVE_FILE}' and trashed=false`);
  const d=await driveReq('GET',`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`);
  const id=d.files?.[0]?.id;if(!id)return null;driveFileId=id;
  const t=await driveReq('GET',`https://www.googleapis.com/drive/v3/files/${id}?alt=media`);
  return JSON.parse(typeof t==='string'?t:JSON.stringify(t));
}
async function saveToDrive(data){
  const content=JSON.stringify(data),meta={name:DRIVE_FILE,mimeType:'application/json'};
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
  form.append('file',new Blob([content],{type:'application/json'}));
  const url=driveFileId
    ?`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=multipart`
    :'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
  const r=await fetch(url,{method:driveFileId?'PATCH':'POST',headers:{Authorization:`Bearer ${gToken}`},body:form});
  if(!r.ok)throw new Error('Drive save failed');
  if(!driveFileId){const c=await r.json();driveFileId=c.id;}
}

// ── Checkbox ──────────────────────────────────────────────────────────────────
function Checkbox({done,color='#4B8EF7',onToggle}){
  const [pop,setPop]=useState(false);
  const handle=e=>{
    e.stopPropagation();
    if(!done){setPop(true);setTimeout(()=>setPop(false),400);}
    onToggle();
  };
  return(
    <div onClick={handle} style={{
      width:22,height:22,borderRadius:'50%',flexShrink:0,marginTop:1,
      border:`2px solid ${done?color:'#C7C7CC'}`,
      background:done?color:'transparent',
      display:'flex',alignItems:'center',justifyContent:'center',
      cursor:'pointer',transition:'border-color .15s,background .15s',
      animation:pop?'checkPop .4s ease':undefined,
    }}>
      {done&&<svg width="12" height="10" viewBox="0 0 12 10"><polyline points="1,5 4.5,8.5 11,1" fill="none" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
    </div>
  );
}

// ── Checklist Item ────────────────────────────────────────────────────────────
function CItem({item,onChange,onDelete}){
  return(
    <div style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0'}}>
      <div onClick={()=>onChange({...item,done:!item.done})} style={{
        width:16,height:16,borderRadius:3,flexShrink:0,cursor:'pointer',
        border:`1.5px solid ${item.done?'#4B8EF7':'#C7C7CC'}`,
        background:item.done?'#4B8EF7':'transparent',
        display:'flex',alignItems:'center',justifyContent:'center',
      }}>
        {item.done&&<svg width="9" height="7" viewBox="0 0 10 8"><polyline points="1,4 3.5,6.5 9,1" fill="none" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
      </div>
      <input value={item.text} onChange={e=>onChange({...item,text:e.target.value})}
        style={{flex:1,border:'none',background:'transparent',fontSize:13,fontFamily:"'Lora',serif",color:item.done?'#AEAEB2':'#1C1C1E',textDecoration:item.done?'line-through':'none',padding:0}}
      />
      <button onClick={onDelete} style={{background:'none',border:'none',color:'#C7C7CC',cursor:'pointer',fontSize:16,lineHeight:1,padding:0}}>×</button>
    </div>
  );
}

// ── Move Task Picker ─────────────────────────────────────────────────────────
function MoveTaskPicker({task,projects,areas,onUpdate}){
  const [open,setOpen]=useState(false);
  const curProject=projects.find(p=>p.id===task.projectId);
  return(
    <div style={{marginBottom:12,position:'relative'}}>
      <button onClick={()=>setOpen(o=>!o)} style={{display:'flex',alignItems:'center',gap:6,background:'#F2F2F7',border:'none',borderRadius:8,padding:'6px 12px',cursor:'pointer',fontSize:11,fontFamily:"'DM Mono',monospace",color:'#6B6B6B'}}>
        {curProject?<><div style={{width:8,height:8,borderRadius:'50%',background:curProject.color||'#4B8EF7'}}/>{curProject.title}</>:<span>No project</span>}
        <span style={{color:'#AEAEB2',fontSize:10,marginLeft:2}}>▾</span>
      </button>
      {open&&(
        <div style={{position:'absolute',top:36,left:0,background:'#fff',border:'1px solid #E5E5EA',borderRadius:10,boxShadow:'0 8px 24px rgba(0,0,0,.1)',zIndex:200,minWidth:200,maxHeight:260,overflowY:'auto'}} className="fade">
          <button onClick={()=>{onUpdate({...task,projectId:null,headingId:null,section:'inbox'});setOpen(false);}}
            style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'10px 14px',background:'none',border:'none',borderBottom:'1px solid #F2F2F7',fontSize:13,fontFamily:"'Lora',serif",color:'#6B6B6B',cursor:'pointer',textAlign:'left'}}
            onMouseEnter={e=>e.currentTarget.style.background='#F8F8FA'}
            onMouseLeave={e=>e.currentTarget.style.background='none'}
          >
            <span>📥</span> Inbox (no project)
          </button>
          {/* Standalone projects */}
          {projects.filter(p=>!p.areaId&&p.status==="active").map(p=>(
            <button key={p.id} onClick={()=>{onUpdate({...task,projectId:p.id,headingId:null,section:'anytime'});setOpen(false);}}
              style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'10px 14px',background:task.projectId===p.id?'#EBF3FF':'none',border:'none',borderBottom:'1px solid #F2F2F7',fontSize:13,fontFamily:"'Lora',serif",color:'#1C1C1E',cursor:'pointer',textAlign:'left'}}
              onMouseEnter={e=>e.currentTarget.style.background='#F8F8FA'}
              onMouseLeave={e=>e.currentTarget.style.background=task.projectId===p.id?'#EBF3FF':'none'}
            >
              <div style={{width:8,height:8,borderRadius:'50%',background:p.color||'#4B8EF7',flexShrink:0}}/>{p.title}
              {task.projectId===p.id&&<span style={{marginLeft:'auto',color:'#4B8EF7',fontSize:14}}>✓</span>}
            </button>
          ))}
          {/* Projects grouped by area */}
          {areas.map(a=>{
            const aProjs=projects.filter(p=>p.areaId===a.id&&p.status==="active");
            if(!aProjs.length)return null;
            return(
              <div key={a.id}>
                <div style={{padding:'8px 14px 4px',fontSize:10,fontFamily:"'DM Mono',monospace",fontWeight:600,color:'#AEAEB2',textTransform:'uppercase',letterSpacing:'.08em'}}>{a.name}</div>
                {aProjs.map(p=>(
                  <button key={p.id} onClick={()=>{onUpdate({...task,projectId:p.id,headingId:null,section:'anytime'});setOpen(false);}}
                    style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'9px 14px',background:task.projectId===p.id?'#EBF3FF':'none',border:'none',borderBottom:'1px solid #F2F2F7',fontSize:13,fontFamily:"'Lora',serif",color:'#1C1C1E',cursor:'pointer',textAlign:'left'}}
                    onMouseEnter={e=>e.currentTarget.style.background='#F8F8FA'}
                    onMouseLeave={e=>e.currentTarget.style.background=task.projectId===p.id?'#EBF3FF':'none'}
                  >
                    <div style={{width:8,height:8,borderRadius:'50%',background:p.color||'#4B8EF7',flexShrink:0}}/>{p.title}
                    {task.projectId===p.id&&<span style={{marginLeft:'auto',color:'#4B8EF7',fontSize:14}}>✓</span>}
                  </button>
                ))}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


// ── Jump Start Popover ────────────────────────────────────────────────────────
function JumpStart({task,onUpdate,onClose}){
  const today=todayStr();
  const [customDate,setCustomDate]=useState('');
  const options=[
    {label:'Today',      icon:'⭐', action:()=>onUpdate({...task,when:today,section:task.section==='someday'?'anytime':task.section})},
    {label:'This Evening',icon:'🌙',action:()=>onUpdate({...task,when:today,section:'evening'})},
    {label:'Tomorrow',   icon:'☀️',action:()=>onUpdate({...task,when:addDays(1),section:task.section==='someday'?'anytime':task.section})},
    {label:'Next Week',  icon:'📅', action:()=>onUpdate({...task,when:addDays(7),section:task.section==='someday'?'anytime':task.section})},
    {label:'Someday',    icon:'☁️',action:()=>onUpdate({...task,when:null,section:'someday'})},
    {label:'No Date',    icon:'✕',  action:()=>onUpdate({...task,when:null,section:task.section==='someday'?'anytime':task.section})},
  ];
  return(
    <div style={{position:'absolute',top:32,left:0,zIndex:300,background:'#fff',border:'1px solid #E5E5EA',borderRadius:12,boxShadow:'0 8px 28px rgba(0,0,0,.13)',minWidth:190,overflow:'hidden'}} className="fade" onClick={e=>e.stopPropagation()}>
      {options.map(o=>(
        <button key={o.label} onClick={()=>{o.action();onClose();}}
          style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'9px 14px',background:'none',border:'none',borderBottom:'1px solid #F2F2F7',fontSize:13,fontFamily:"'Lora',serif",color:'#1C1C1E',cursor:'pointer',textAlign:'left'}}
          onMouseEnter={e=>e.currentTarget.style.background='#F8F8FA'}
          onMouseLeave={e=>e.currentTarget.style.background='none'}
        >
          <span style={{fontSize:15,width:20,textAlign:'center'}}>{o.icon}</span>{o.label}
        </button>
      ))}
      <div style={{padding:'8px 10px',borderTop:'1px solid #F2F2F7',display:'flex',gap:6,alignItems:'center'}}>
        <input type="date" value={customDate} onChange={e=>setCustomDate(e.target.value)}
          style={{flex:1,border:'1px solid #E5E5EA',borderRadius:6,padding:'5px 8px',fontSize:11,fontFamily:"'DM Mono',monospace",color:'#1C1C1E'}}
        />
        {customDate&&<button onClick={()=>{onUpdate({...task,when:customDate,section:task.section==='someday'?'anytime':task.section});onClose();}}
          style={{background:'#4B8EF7',border:'none',borderRadius:6,padding:'5px 10px',color:'#fff',fontSize:11,cursor:'pointer'}}>Set</button>}
      </div>
    </div>
  );
}

// ── Task Row ──────────────────────────────────────────────────────────────────
function TaskRow({task,project,projects=[],areas=[],onComplete,onUpdate,onDelete,onConvertToProject,showProject,apiKey,onTagClick}){
  const [expanded,setExpanded]=useState(false);
  const [completing,setCompleting]=useState(false);
  const [showJS,setShowJS]=useState(false);
  const [title,setTitle]=useState(task.title);
  const [notes,setNotes]=useState(task.notes||'');
  const [newTag,setNewTag]=useState('');
  const [tagInput,setTagInput]=useState(false);
  const [clItem,setClItem]=useState('');
  const [aiLoading,setAiLoading]=useState(false);
  const taskRef=useRef(task);
  useEffect(()=>{taskRef.current=task;},[task]);
  const color=project?.color||'#4B8EF7';
  const dl=task.deadline,wh=task.when;
  const late=dl&&dl<todayStr()&&!task.done;
  const clDone=(task.checklist||[]).filter(c=>c.done).length;
  const clTotal=(task.checklist||[]).length;

  const handleCheck=()=>{
    setCompleting(true);
    setTimeout(()=>{onComplete(task.id);setCompleting(false);},360);
  };
  const save=()=>onUpdate({...taskRef.current,title,notes});
  // Always use taskRef.current so we have the freshest checklist
  const updCl=items=>onUpdate({...taskRef.current,checklist:items});
  const addCl=(e)=>{
    if(e){e.preventDefault();e.stopPropagation();}
    if(!clItem.trim())return;
    const current=taskRef.current.checklist||[];
    updCl([...current,{id:uid(),text:clItem.trim(),done:false}]);
    setClItem('');
  };
  const addTag=()=>{
    if(!newTag.trim())return;
    onUpdate({...taskRef.current,tags:[...(taskRef.current.tags||[]),newTag.trim().replace(/^#/,'')]});
    setNewTag('');setTagInput(false);
  };
  const suggestCl=async()=>{
    if(!apiKey){alert('Add API key in Settings first.');return;}
    setAiLoading(true);
    try{
      const items=await aiSuggestChecklist(apiKey,task.title);
      const newItems=items.map(t=>({id:uid(),text:t,done:false}));
      updCl([...(taskRef.current.checklist||[]),...newItems]);
    }catch(e){alert('Could not generate checklist: '+e.message);}
    setAiLoading(false);
  };

  return(
    <div className={completing?'task-completing':''} style={{overflow:'hidden'}}>
      {/* Main row */}
      <div className="task-row" onClick={()=>{setExpanded(e=>!e);setTitle(task.title);setNotes(task.notes||'');}}>
        <div style={{paddingTop:1}} onClick={e=>{e.stopPropagation();handleCheck();}}>
          <Checkbox done={task.done} color={color}/>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:15,color:task.done?'#AEAEB2':'#1C1C1E',fontFamily:"'Lora',serif",lineHeight:1.4,textDecoration:task.done?'line-through':'none'}}>{task.title}</div>
          {!expanded&&(
            <div style={{display:'flex',alignItems:'center',gap:8,marginTop:2,flexWrap:'wrap'}}>
              {showProject&&project&&<span style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:project.color||'#4B8EF7',fontWeight:500}}>{project.title}</span>}
              {wh&&<span style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:isOverdue(wh)?'#FF3B30':'#FF9500'}}>{fmtDate(wh)}</span>}
              {dl&&<span style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:late?'#FF3B30':'#6B6B6B'}}>⚑ {fmtDate(dl)}</span>}
              {clTotal>0&&<span style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:'#AEAEB2'}}>{clDone}/{clTotal}</span>}
              {(task.tags||[]).map(t=><span key={t} onClick={e=>{e.stopPropagation();onTagClick&&onTagClick(t);}} style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:'#4B8EF7',cursor:'pointer'}}>#{t}</span>)}
            </div>
          )}
        </div>
        <div style={{position:'relative',flexShrink:0}}>
          <button onClick={e=>{e.stopPropagation();setShowJS(s=>!s);}} style={{background:'none',border:'none',cursor:'pointer',color:task.when?'#FF9500':'#D1D1D6',fontSize:13,padding:'2px 4px',lineHeight:1}} title="Schedule">
            {task.when?fmtDate(task.when).slice(0,3):'📅'}
          </button>
          {showJS&&<><div style={{position:'fixed',inset:0,zIndex:299}} onClick={()=>setShowJS(false)}/><JumpStart task={task} onUpdate={onUpdate} onClose={()=>setShowJS(false)}/></>}
        </div>
        <div style={{fontSize:13,color:'#D1D1D6',paddingTop:2,flexShrink:0}}>{expanded?'▲':'▾'}</div>
      </div>

      {/* Expanded editor */}
      {expanded&&(
        <div style={{padding:'4px 16px 14px 50px',background:'#FAFAFA',borderBottom:'1px solid #F2F2F7'}} onClick={e=>e.stopPropagation()}>
          <input value={title} onChange={e=>setTitle(e.target.value)} onBlur={save} autoFocus
            style={{width:'100%',border:'none',background:'transparent',fontSize:15,fontFamily:"'Lora',serif",color:'#1C1C1E',padding:0,marginBottom:6}}
          />
          <textarea value={notes} onChange={e=>setNotes(e.target.value)} onBlur={save}
            placeholder="Notes…" rows={2}
            style={{width:'100%',border:'none',background:'transparent',fontSize:13,fontFamily:"'Lora',serif",color:'#6B6B6B',resize:'none',padding:0,marginBottom:12}}
          />
          {/* Dates */}
          <div style={{display:'flex',gap:16,marginBottom:12,flexWrap:'wrap'}}>
            {[{label:'When',key:'when'},{label:'Deadline',key:'deadline'}].map(({label,key})=>(
              <label key={key} style={{display:'flex',alignItems:'center',gap:6,fontSize:12,fontFamily:"'DM Mono',monospace",color:'#6B6B6B'}}>
                {label}
                <input type="date" value={task[key]||''} onChange={e=>onUpdate({...task,[key]:e.target.value||null})}
                  style={{border:'1px solid #E5E5EA',borderRadius:6,padding:'3px 8px',fontSize:11,fontFamily:"'DM Mono',monospace",color:'#1C1C1E'}}
                />
                {task[key]&&<span onClick={()=>onUpdate({...task,[key]:null})} style={{cursor:'pointer',color:'#AEAEB2',fontSize:16,lineHeight:1}}>×</span>}
              </label>
            ))}
          </div>
          {/* Section */}
          <div style={{display:'flex',gap:5,marginBottom:12,flexWrap:'wrap'}}>
            {['inbox','anytime','someday'].map(s=>(
              <button key={s} onClick={()=>onUpdate({...task,section:s})}
                style={{background:task.section===s?'#EBF3FF':'#F2F2F7',border:`1px solid ${task.section===s?'#4B8EF7':'transparent'}`,borderRadius:7,padding:'4px 10px',fontSize:10,fontFamily:"'DM Mono',monospace",color:task.section===s?'#4B8EF7':'#6B6B6B',cursor:'pointer',textTransform:'uppercase',letterSpacing:'.05em'}}
              >{s}</button>
            ))}
          </div>
          {/* Move to project */}
          <MoveTaskPicker task={task} projects={projects} areas={areas} onUpdate={onUpdate}/>
          {/* Tags */}
          <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:12,flexWrap:'wrap'}}>
            {(task.tags||[]).map(t=>(
              <span key={t} style={{display:'inline-flex',alignItems:'center',gap:3,background:'#EBF3FF',color:'#4B8EF7',border:'1px solid #c3d7f7',borderRadius:12,padding:'2px 8px',fontSize:11,fontFamily:"'DM Mono',monospace"}}>
                #{t}
                <span onClick={e=>{e.stopPropagation();onTagClick&&onTagClick(t);}} style={{cursor:'pointer',opacity:.8,lineHeight:1,fontSize:11}}>↗</span>
                <span onClick={()=>onUpdate({...task,tags:(task.tags||[]).filter(x=>x!==t)})} style={{cursor:'pointer',opacity:.6,lineHeight:1,fontSize:14}}>×</span>
              </span>
            ))}
            {tagInput?(
              <input value={newTag} onChange={e=>setNewTag(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter')addTag();if(e.key==='Escape'){setNewTag('');setTagInput(false);}}}
                onBlur={()=>{if(!newTag.trim())setTagInput(false);}}
                placeholder="#tag" autoFocus
                style={{border:'1px solid #E5E5EA',borderRadius:7,padding:'3px 8px',fontSize:11,fontFamily:"'DM Mono',monospace",width:80}}
              />
            ):(
              <button onClick={()=>setTagInput(true)} style={{background:'none',border:'1px dashed #C7C7CC',borderRadius:12,padding:'2px 10px',fontSize:11,fontFamily:"'DM Mono',monospace",color:'#AEAEB2',cursor:'pointer'}}>+ tag</button>
            )}
          </div>
          {/* Checklist */}
          {(task.checklist||[]).length>0&&(
            <div style={{marginBottom:8,paddingBottom:8,borderBottom:'1px solid #F2F2F7'}}>
              {(task.checklist||[]).map((item,i)=>(
                <CItem key={item.id} item={item}
                  onChange={upd=>updCl((task.checklist||[]).map((c,j)=>j===i?upd:c))}
                  onDelete={()=>updCl((task.checklist||[]).filter((_,j)=>j!==i))}
                />
              ))}
            </div>
          )}
          {/* Add checklist */}
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
            <input value={clItem} onChange={e=>setClItem(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();e.stopPropagation();addCl();}}}
              onClick={e=>e.stopPropagation()}
              placeholder="Add checklist item…"
              style={{flex:1,border:'none',background:'transparent',fontSize:12,fontFamily:"'Lora',serif",color:'#6B6B6B',padding:0,outline:'none'}}
            />
            {clItem&&<button onClick={e=>{e.preventDefault();e.stopPropagation();addCl();}} style={{background:'#4B8EF7',border:'none',borderRadius:4,padding:'3px 8px',color:'#fff',fontSize:11,cursor:'pointer'}}>Add</button>}
            <button onClick={suggestCl} disabled={aiLoading} style={{background:'none',border:'1px solid #E5E5EA',borderRadius:7,padding:'3px 10px',fontSize:10,fontFamily:"'DM Mono',monospace",color:'#4B8EF7',cursor:'pointer'}}>
              {aiLoading?'…':'✦ AI suggest'}
            </button>
          </div>
          {/* Actions */}
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            {onConvertToProject&&<button onClick={()=>onConvertToProject(task)} style={{background:'none',border:'1px solid #E5E5EA',borderRadius:6,padding:'4px 10px',color:'#7c3aed',fontSize:11,fontFamily:"'DM Mono',monospace",cursor:'pointer',marginRight:'auto'}}>📁 Convert to project</button>}
            <button onClick={()=>onDelete(task.id)} style={{background:'none',border:'none',color:'#FF3B30',fontSize:12,fontFamily:"'DM Mono',monospace",cursor:'pointer'}}>Delete</button>
            <button onClick={()=>setExpanded(false)} style={{background:'none',border:'1px solid #E5E5EA',borderRadius:6,padding:'4px 14px',color:'#6B6B6B',fontSize:12,fontFamily:"'DM Mono',monospace",cursor:'pointer'}}>Done</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── New Task Row ──────────────────────────────────────────────────────────────
function NewTaskRow({onAdd,placeholder='New To-Do',section='inbox',projectId=null,headingId=null,when=null}){
  const [active,setActive]=useState(false);
  const [val,setVal]=useState('');
  const ref=useRef(null);
  const submit=()=>{
    if(!val.trim()){setActive(false);return;}
    onAdd({title:val.trim(),section,projectId,headingId,when});
    setVal('');ref.current?.focus();
  };
  if(!active)return(
    <div onClick={()=>{setActive(true);setTimeout(()=>ref.current?.focus(),50);}}
      style={{display:'flex',alignItems:'center',gap:12,padding:'8px 16px',cursor:'pointer',color:'#AEAEB2',fontSize:15,fontFamily:"'Lora',serif",borderRadius:8,transition:'background .1s'}}
      onMouseEnter={e=>e.currentTarget.style.background='#F8F8FA'}
      onMouseLeave={e=>e.currentTarget.style.background='transparent'}
    >
      <span style={{fontSize:20,lineHeight:1}}>+</span>{placeholder}
    </div>
  );
  return(
    <div style={{display:'flex',alignItems:'center',gap:12,padding:'8px 16px'}}>
      <div style={{width:22,height:22,borderRadius:'50%',border:'2px solid #C7C7CC',flexShrink:0}}/>
      <input ref={ref} value={val} onChange={e=>setVal(e.target.value)}
        onKeyDown={e=>{if(e.key==='Enter')submit();if(e.key==='Escape'){setActive(false);setVal('');}}}
        onBlur={()=>{if(!val.trim())setActive(false);}}
        placeholder={placeholder} autoFocus
        style={{flex:1,border:'none',background:'transparent',fontSize:15,fontFamily:"'Lora',serif",color:'#1C1C1E',padding:0}}
      />
    </div>
  );
}

// ── Heading Row ───────────────────────────────────────────────────────────────
function HeadingRow({heading,onUpdate}){
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState(heading.title);
  if(editing)return(
    <div style={{padding:'16px 16px 4px'}}>
      <input value={val} onChange={e=>setVal(e.target.value)}
        onBlur={()=>{onUpdate({...heading,title:val});setEditing(false);}}
        onKeyDown={e=>{if(e.key==='Enter'){onUpdate({...heading,title:val});setEditing(false);}}}
        autoFocus style={{border:'none',background:'transparent',fontSize:12,fontFamily:"'DM Mono',monospace",fontWeight:600,color:'#6B6B6B',letterSpacing:'.08em',textTransform:'uppercase',width:'100%'}}
      />
    </div>
  );
  return(
    <div onDoubleClick={()=>setEditing(true)} style={{padding:'16px 16px 4px',cursor:'default'}}>
      <span style={{fontSize:12,fontFamily:"'DM Mono',monospace",fontWeight:600,color:'#AEAEB2',letterSpacing:'.08em',textTransform:'uppercase'}}>{heading.title}</span>
    </div>
  );
}

// ── Project View ──────────────────────────────────────────────────────────────
function ProjectView({project,tasks,headings,areas,apiKey,onAddTask,onUpdateTask,onCompleteTask,onDeleteTask,onAddHeading,onUpdateHeading,onUpdateProject,onDeleteProject,autoEdit=false,onAutoEditDone}){
  const area=areas.find(a=>a.id===project.areaId);
  const active=tasks.filter(t=>t.projectId===project.id&&!t.done);
  const done=tasks.filter(t=>t.projectId===project.id&&t.done);
  const total=tasks.filter(t=>t.projectId===project.id).length;
  const progress=total>0?Math.round((done.length/total)*100):0;
  const noHead=active.filter(t=>!t.headingId);
  const groups=headings.map(h=>({h,tasks:active.filter(t=>t.headingId===h.id)}));
  const sharedProps={project,projects,areas,onComplete:onCompleteTask,onUpdate:onUpdateTask,onDelete:onDeleteTask,apiKey,onTagClick:null,onConvertToProject:null};

  const [showEdit,setShowEdit]=useState(autoEdit);
  const [notes,setNotes]=useState(project.notes||'');
  useEffect(()=>{if(autoEdit){setShowEdit(true);onAutoEditDone&&onAutoEditDone();}},[]);
  const saveNotes=()=>{if(notes!==project.notes)onUpdateProject({...project,notes});};
  return(
    <div>
      {showEdit&&<EditProjectSheet project={project} areas={areas} onSave={p=>{onUpdateProject(p);setShowEdit(false);}} onDelete={onDeleteProject} onClose={()=>setShowEdit(false)}/>}
      <div style={{padding:'24px 24px 16px'}}>
        {area&&<div style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:'#AEAEB2',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:4}}>{area.name}</div>}
        <div style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:10}}>
          <h1 style={{flex:1,margin:0,fontSize:26,fontFamily:"'Lora',serif",fontWeight:500,color:'#1C1C1E',lineHeight:1.2}}>{project.title}</h1>
          <button onClick={()=>setShowEdit(true)} style={{background:'none',border:'none',color:'#AEAEB2',fontSize:20,cursor:'pointer',padding:'2px 4px',lineHeight:1,flexShrink:0}}>⋯</button>
        </div>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)} onBlur={saveNotes}
          placeholder="Project notes…"
          rows={notes?undefined:1}
          style={{width:'100%',border:'none',background:'transparent',fontSize:13,fontFamily:"'Lora',serif",color:'#6B6B6B',resize:'none',padding:0,lineHeight:1.6,marginBottom:8,outline:'none'}}
        />
        {total>0&&(
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{flex:1,height:4,background:'#E5E5EA',borderRadius:2,overflow:'hidden'}}>
              <div style={{height:'100%',background:project.color||'#4B8EF7',borderRadius:2,width:`${progress}%`,transition:'width .4s ease'}}/>
            </div>
            <span style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:'#AEAEB2',flexShrink:0}}>{progress}%</span>
          </div>
        )}
      </div>
      {/* Tasks without heading */}
      {noHead.map(t=><TaskRow key={t.id} task={t} {...sharedProps}/>)}
      {/* Headed groups */}
      {groups.map(({h,tasks:ht})=>(
        <div key={h.id}>
          <HeadingRow heading={h} onUpdate={onUpdateHeading}/>
          {ht.map(t=><TaskRow key={t.id} task={t} {...sharedProps}/>)}
          <NewTaskRow onAdd={f=>onAddTask({...f,headingId:h.id,projectId:project.id,section:'anytime'})} placeholder="New To-Do" section="anytime" projectId={project.id} headingId={h.id}/>
        </div>
      ))}
      <NewTaskRow onAdd={f=>onAddTask({...f,projectId:project.id,section:'anytime'})} placeholder="New To-Do" section="anytime" projectId={project.id}/>
      <div style={{padding:'4px 16px 8px'}}>
        <button onClick={()=>onAddHeading(project.id)} style={{background:'none',border:'none',color:'#AEAEB2',fontSize:12,fontFamily:"'DM Mono',monospace",cursor:'pointer',padding:'4px 0'}}>+ Add heading</button>
      </div>
      {/* Done */}
      {done.length>0&&(
        <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid #F2F2F7'}}>
          <div style={{padding:'8px 16px 4px',fontSize:11,fontFamily:"'DM Mono',monospace",color:'#AEAEB2',textTransform:'uppercase',letterSpacing:'.08em'}}>Completed · {done.length}</div>
          {done.map(t=>(
            <div key={t.id} style={{display:'flex',alignItems:'center',gap:12,padding:'7px 16px',opacity:.5}}>
              <div style={{width:22,height:22,borderRadius:'50%',background:project.color||'#4B8EF7',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <svg width="12" height="10" viewBox="0 0 12 10"><polyline points="1,5 4.5,8.5 11,1" fill="none" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </div>
              <span style={{fontSize:14,fontFamily:"'Lora',serif",color:'#AEAEB2',textDecoration:'line-through'}}>{t.title}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── AI Planner ────────────────────────────────────────────────────────────────
function AIPlanner({apiKey,projectTitle,onAccept,onClose}){
  const [desc,setDesc]=useState('');
  const [plan,setPlan]=useState(null);
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');
  const run=async()=>{
    if(!desc.trim())return;
    if(!apiKey){setErr('Add your API key in Settings first.');return;}
    setBusy(true);setErr('');
    try{const p=await planProject(apiKey,projectTitle,desc);setPlan(p);}
    catch(e){setErr(e.message||'Failed — try again.');}
    setBusy(false);
  };
  return(
    <div className="overlay" onClick={onClose}>
      <div className="sheet-box sheet" onClick={e=>e.stopPropagation()}>
        <div className="handle"/>
        <div className="sh-hdr">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <h3 style={{margin:0,fontSize:17,fontFamily:"'Lora',serif",fontWeight:500}}>Plan with AI</h3>
              <p style={{margin:'3px 0 0',fontSize:12,color:'#AEAEB2',fontFamily:"'DM Mono',monospace"}}>Describe what you want to achieve</p>
            </div>
            <button onClick={onClose} style={{background:'none',fontSize:22,color:'#AEAEB2',border:'none',cursor:'pointer'}}>✕</button>
          </div>
        </div>
        <div className="sh-body">
          {!plan?(
            <>
              <textarea value={desc} onChange={e=>setDesc(e.target.value)} className="inp" autoFocus
                placeholder={`Describe the project goal and any context...\n\ne.g. "Redesign the company website. Need new homepage, about page, and contact form. Working with an external developer."`}
                rows={6} style={{resize:'none',lineHeight:1.75,marginBottom:12}}
              />
              {err&&<div style={{display:'flex',alignItems:'center',gap:8,background:'#FFF5F5',border:'1px solid #FFCCCC',borderRadius:8,padding:'9px 12px',marginBottom:10}}><span style={{fontSize:12,color:'#FF3B30',fontFamily:"'DM Mono',monospace",flex:1}}>{err}</span><span onClick={()=>setErr('')} style={{color:'#FFAAAA',cursor:'pointer',fontSize:16,lineHeight:1}}>×</span></div>}
              <button onClick={run} disabled={!desc.trim()||busy} className="btn-primary" style={{background:desc.trim()&&!busy?'#4B8EF7':undefined,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                {busy?<><span style={{animation:'spin 1s linear infinite',display:'inline-block',fontSize:16}}>✦</span>Planning…</>:'Generate plan →'}
              </button>
            </>
          ):(
            <>
              <p style={{fontSize:13,color:'#6B6B6B',fontFamily:"'Lora',serif",fontStyle:'italic',marginBottom:16,lineHeight:1.6}}>Review the plan, then save it to your project.</p>
              {plan.map((sec,i)=>(
                <div key={i} style={{marginBottom:16}}>
                  {sec.heading&&<div style={{fontSize:11,fontFamily:"'DM Mono',monospace",fontWeight:600,color:'#AEAEB2',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:8}}>{sec.heading}</div>}
                  {sec.tasks.map((t,j)=>(
                    <div key={j} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 0',borderBottom:'1px solid #F2F2F7'}}>
                      <div style={{width:18,height:18,borderRadius:'50%',border:'2px solid #C7C7CC',flexShrink:0}}/>
                      <span style={{fontSize:14,fontFamily:"'Lora',serif",color:'#1C1C1E'}}>{t}</span>
                    </div>
                  ))}
                </div>
              ))}
            </>
          )}
        </div>
        {plan&&(
          <div className="sh-foot" style={{display:'flex',gap:8}}>
            <button onClick={()=>setPlan(null)} className="btn-ghost" style={{flex:1}}>← Redo</button>
            <button onClick={()=>onAccept(plan)} style={{flex:2,background:'#4B8EF7',border:'none',borderRadius:10,padding:'12px',color:'#fff',fontSize:11,fontFamily:"'DM Mono',monospace",letterSpacing:'.06em',textTransform:'uppercase',cursor:'pointer'}}>Save to project →</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── New Project Sheet ─────────────────────────────────────────────────────────
function NewProjectSheet({areas,apiKey,onSave,onClose,initialAreaId=null}){
  const [title,setTitle]=useState('');
  const [areaId,setAreaId]=useState(initialAreaId);
  const [color,setColor]=useState(COLORS[0]);
  const [plan,setPlan]=useState(null);
  const [showAI,setShowAI]=useState(false);

  if(showAI)return(
    <AIPlanner apiKey={apiKey} projectTitle={title||'New Project'}
      onAccept={p=>{setPlan(p);setShowAI(false);}}
      onClose={()=>setShowAI(false)}
    />
  );

  return(
    <div className="overlay" onClick={onClose}>
      <div className="sheet-box sheet" onClick={e=>e.stopPropagation()}>
        <div className="handle"/>
        <div className="sh-hdr">
          <h3 style={{margin:0,fontSize:17,fontFamily:"'Lora',serif",fontWeight:500}}>New Project</h3>
        </div>
        <div className="sh-body">
          <input value={title} onChange={e=>setTitle(e.target.value)} onKeyDown={e=>e.key==='Enter'&&title.trim()&&onSave({title,areaId,color,plan})&&onClose()}
            placeholder="Project title" autoFocus className="inp" style={{marginBottom:14}}
          />
          {/* Color */}
          <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
            {COLORS.map(c=>(
              <div key={c} onClick={()=>setColor(c)} style={{width:26,height:26,borderRadius:'50%',background:c,cursor:'pointer',boxShadow:color===c?`0 0 0 2px #fff, 0 0 0 4px ${c}`:'none',transition:'box-shadow .12s'}}/>
            ))}
          </div>
          {/* Area */}
          {areas.length>0&&(
            <div style={{marginBottom:14}}>
              <p style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:'#AEAEB2',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:6}}>Area</p>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                <button onClick={()=>setAreaId(null)} style={{background:!areaId?'#EBF3FF':'#F2F2F7',border:`1px solid ${!areaId?'#4B8EF7':'transparent'}`,borderRadius:8,padding:'5px 12px',fontSize:12,fontFamily:"'DM Mono',monospace",color:!areaId?'#4B8EF7':'#6B6B6B',cursor:'pointer'}}>None</button>
                {areas.map(a=>(

// ── Brain Dump ────────────────────────────────────────────────────────────────
function BrainDump({apiKey,onSaveAll,onClose}){
  const [stage,setStage]=useState(1);
  const [text,setText]=useState('');
  const [items,setItems]=useState([]);
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');
  const ref=useRef(null);
  useEffect(()=>{setTimeout(()=>ref.current?.focus(),100);},[]);

  const extract=async()=>{
    if(!text.trim())return;
    if(!apiKey){setErr('API key needed — add it in Settings.');return;}
    setBusy(true);setErr('');
    try{const r=await parseDump(apiKey,text);setItems(r.map(i=>({...i,id:uid(),_keep:true})));setStage(2);}
    catch(e){setErr(e.message||'Failed — try again.');}
    setBusy(false);
  };
  const moveIndent=(id,d)=>setItems(it=>it.map(i=>i.id===id?{...i,indent:Math.max(0,Math.min(1,(i.indent||0)+d))}:i));
  const toggle=id=>setItems(it=>it.map(i=>i.id===id?{...i,_keep:!i._keep}:i));
  const save=()=>{
    onSaveAll(items.filter(i=>i._keep).map(({_keep,indent,...r})=>({...r,id:uid(),done:false,checklist:[],tags:[],createdAt:new Date().toISOString()})));
    onClose();
  };

  return(
    <div className="overlay" onClick={stage===1?onClose:undefined}>
      <div className="sheet-box sheet" onClick={e=>e.stopPropagation()}>
        <div className="handle"/>
        <div className="sh-hdr">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
            <div>
              <h3 style={{margin:0,fontSize:17,fontFamily:"'Lora',serif",fontWeight:500}}>Brain dump</h3>
              <p style={{margin:'3px 0 0',fontSize:12,color:'#AEAEB2',fontFamily:"'DM Mono',monospace"}}>
                {stage===1?'Just write — I\'ll sort it out':'Review items, then save'}
              </p>
            </div>
            <button onClick={onClose} style={{background:'none',fontSize:22,color:'#AEAEB2',border:'none',cursor:'pointer'}}>✕</button>
          </div>
          <div style={{display:'flex',gap:3}}>
            {['Write','Review','Save'].map((l,i)=>(
              <div key={i} style={{height:3,flex:1,borderRadius:2,background:stage>i?'#4B8EF7':'#E5E5EA',transition:'background .3s'}}/>
            ))}
          </div>
        </div>
        <div className="sh-body">
          {stage===1&&(
            <>
              <textarea ref={ref} value={text} onChange={e=>setText(e.target.value)}
                placeholder={"Write everything on your mind — stream of consciousness, no structure needed.\n\nNeed to call the accountant. Idea for automating reports. Pick up dry cleaning today. Reply to Sarah asap."}
                rows={9} className="inp" style={{resize:'none',lineHeight:1.75,marginBottom:12}}
              />
              {err&&<div style={{display:'flex',alignItems:'center',gap:8,background:'#FFF5F5',border:'1px solid #FFCCCC',borderRadius:8,padding:'9px 12px',marginBottom:10}}><span style={{fontSize:12,color:'#FF3B30',fontFamily:"'DM Mono',monospace",flex:1}}>{err}</span><span onClick={()=>setErr('')} style={{color:'#FFAAAA',cursor:'pointer',fontSize:16,lineHeight:1}}>×</span></div>}
              <button onClick={extract} disabled={!text.trim()||busy} className="btn-primary" style={{background:text.trim()&&!busy?'#1C1C1E':undefined,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                {busy?<><span style={{animation:'spin 1s linear infinite',display:'inline-block',fontSize:16}}>✦</span>Extracting…</>:err?'Retry →':'Extract items →'}
              </button>
            </>
          )}
          {stage===2&&(
            <>
              <p style={{fontSize:13,color:'#6B6B6B',fontFamily:"'Lora',serif",fontStyle:'italic',marginBottom:14,lineHeight:1.6}}>Use ← → to group related items. Tap × to exclude.</p>
              {items.map(item=>(
                <div key={item.id} style={{display:'flex',gap:8,alignItems:'center',padding:'8px 12px',border:'1px solid #E5E5EA',borderRadius:9,marginBottom:6,background:item._keep?'#fff':'#F8F8FA',opacity:item._keep?1:.4,marginLeft:`${(item.indent||0)*18}px`,transition:'all .15s'}}>
                  <div style={{width:16,height:16,borderRadius:'50%',border:'2px solid #C7C7CC',flexShrink:0}}/>
                  <span style={{flex:1,fontSize:14,fontFamily:"'Lora',serif",color:'#1C1C1E'}}>{item.title}</span>
                  <div style={{display:'flex',gap:3}}>
                    {(item.indent||0)>0&&<button onClick={()=>moveIndent(item.id,-1)} className="mini-btn">←</button>}
                    {(item.indent||0)<1&&<button onClick={()=>moveIndent(item.id,1)} className="mini-btn">→</button>}
                    <button onClick={()=>toggle(item.id)} className="mini-btn" style={{color:item._keep?'#FF3B30':'#34C759'}}>{item._keep?'×':'+'}</button>
                  </div>
                </div>
              ))}
            </>
          )}
        </div>
        {stage===2&&(
          <div className="sh-foot" style={{display:'flex',gap:8}}>
            <button onClick={()=>{setStage(1);setItems([]);}} className="btn-ghost" style={{flex:1}}>← Rewrite</button>
            <button onClick={save} disabled={!items.filter(i=>i._keep).length}
              style={{flex:2,background:'#1C1C1E',border:'none',borderRadius:10,padding:'12px',color:'#fff',fontSize:11,fontFamily:"'DM Mono',monospace",letterSpacing:'.06em',textTransform:'uppercase',cursor:'pointer'}}
            >Save {items.filter(i=>i._keep).length} items →</button>
          </div>
        )}
      </div>
    </div>
  );
}

        {areaProjects.map(p=>{
          const pTasks=tasks.filter(t=>t.projectId===p.id);
          const done=pTasks.filter(t=>t.done).length;
          const total=pTasks.length;
          const progress=total>0?Math.round((done/total)*100):0;
          const remaining=total-done;
          return(
            <div key={p.id} onClick={()=>onGoProject(p.id)}
              style={{background:'#fff',border:'1px solid #E5E5EA',borderLeft:`4px solid ${p.color||'#4B8EF7'}`,borderRadius:10,padding:'14px 16px',marginBottom:10,cursor:'pointer',transition:'box-shadow .15s'}}
              onMouseEnter={e=>e.currentTarget.style.boxShadow='0 3px 14px rgba(0,0,0,.08)'}
              onMouseLeave={e=>e.currentTarget.style.boxShadow='none'}
            >
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:total>0?10:0}}>
                <div style={{width:10,height:10,borderRadius:'50%',background:p.color||'#4B8EF7',flexShrink:0}}/>
                <span style={{flex:1,fontSize:15,fontFamily:"'Lora',serif",fontWeight:500,color:'#1C1C1E'}}>{p.title}</span>
                <span style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:'#AEAEB2'}}>{remaining} left</span>
              </div>
              {total>0&&(
                <div style={{height:3,background:'#E5E5EA',borderRadius:2,overflow:'hidden'}}>
                  <div style={{height:'100%',background:p.color||'#4B8EF7',borderRadius:2,width:`${progress}%`,transition:'width .4s ease'}}/>
                </div>
              )}
            </div>
          );
        })}
        <button onClick={()=>onAddProject({title:'New Project',color:COLORS[0]})}
          style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'12px 14px',background:'none',border:'1.5px dashed #E5E5EA',borderRadius:10,color:'#AEAEB2',fontSize:13,fontFamily:"'Lora',serif",cursor:'pointer',transition:'border-color .15s'}}
          onMouseEnter={e=>e.currentTarget.style.borderColor='#4B8EF7'}
          onMouseLeave={e=>e.currentTarget.style.borderColor='#E5E5EA'}
        >
          <span style={{fontSize:20,lineHeight:1,color:'#C7C7CC'}}>＋</span> New project in {area.name}
        </button>
      </div>
    </div>
  );
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function Sidebar({view,setView,areas,projects,tasks,onNewProject,onNewArea,onEditArea,setSidebarOpen,tagFilter,setTagFilter}){

  const [collapsed,setCollapsed]=useState(()=>{try{return new Set(JSON.parse(localStorage.getItem('th3_collapsed')||'[]'));}catch{return new Set();}});
  const toggleCollapse=id=>{
    setCollapsed(prev=>{
      const next=new Set(prev);
      next.has(id)?next.delete(id):next.add(id);
      localStorage.setItem('th3_collapsed',JSON.stringify([...next]));
      return next;
    });
  };
  const nav=[
    {id:'inbox',   label:'Inbox',    emoji:'📥',  count:inboxN, accent:'#4B8EF7'},

    {id:'upcoming',label:'Upcoming', emoji:'📅',  count:0,      accent:'#FF6B6B'},
    {id:'anytime', label:'Anytime',  emoji:'📋',  count:0,      accent:'#4B8EF7'},
    {id:'someday', label:'Someday',  emoji:'☁️', count:0,      accent:'#8E8E93'},

      </div>
      <div style={{padding:'4px 8px 8px'}}>

        {standalone.map(p=>{
          const id=`project:${p.id}`;const active=view===id&&!tagFilter;

            <button key={p.id} className={`nav-btn${active?' active':''}`} onClick={()=>goTo(id)} style={{background:active?`${p.color||'#4B8EF7'}18`:undefined}}>
              <div style={{width:10,height:10,borderRadius:'50%',background:p.color||'#4B8EF7',flexShrink:0}}/>
              <span className="lbl" style={{color:active?p.color||'#4B8EF7':'#1C1C1E',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.title}</span>
              {n>0&&<span className="cnt">{n}</span>}

          );
        })}
        {areas.map(a=>{
          const isOpen=!collapsed.has(a.id);

                >{a.name}</button>
                <button onClick={()=>onEditArea(a.id)} style={{background:'none',border:'none',color:'#D1D1D6',fontSize:13,cursor:'pointer',padding:'2px 3px',lineHeight:1,opacity:0}} className="area-menu-btn">⋯</button>
                <button onClick={()=>onNewProject(a.id)} style={{background:'none',border:'none',color:'#D1D1D6',fontSize:16,cursor:'pointer',padding:'2px 3px',lineHeight:1,opacity:0}} className="area-menu-btn">＋</button>

          <span style={{fontSize:16}}>◻</span><span style={{fontFamily:"'DM Mono',monospace",fontSize:12}}>New Area</span>

  );
}

// ── Logbook View ──────────────────────────────────────────────────────────────
function LogbookView({tasks,projects}){
  const done=tasks.filter(t=>t.done).sort((a,b)=>(b.doneAt||'').localeCompare(a.doneAt||''));
  const groups={};
  done.forEach(t=>{const d=(t.doneAt||t.createdAt||'').slice(0,10);if(!groups[d])groups[d]=[];groups[d].push(t);});
  if(!done.length)return<div style={{textAlign:'center',padding:'60px 20px'}}><p style={{fontFamily:"'Lora',serif",fontStyle:'italic',fontSize:16,color:'#AEAEB2'}}>Nothing completed yet.</p></div>;
  return(
    <div>
      {Object.entries(groups).map(([date,ts])=>(
        <div key={date}>
          <div style={{padding:'16px 20px 4px',fontSize:11,fontFamily:"'DM Mono',monospace",fontWeight:600,color:'#AEAEB2',textTransform:'uppercase',letterSpacing:'.08em'}}>
            {new Date(date+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}
          </div>
          {ts.map(t=>{
            const p=projects.find(x=>x.id===t.projectId);
            return(
              <div key={t.id} style={{display:'flex',alignItems:'center',gap:12,padding:'8px 20px',opacity:.65}}>
                <div style={{width:20,height:20,borderRadius:'50%',background:p?.color||'#34C759',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <svg width="11" height="9" viewBox="0 0 12 10"><polyline points="1,5 4.5,8.5 11,1" fill="none" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
                <div>
                  <div style={{fontSize:14,fontFamily:"'Lora',serif",color:'#1C1C1E'}}>{t.title}</div>
                  {p&&<div style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:p.color||'#AEAEB2'}}>{p.title}</div>}
                </div>
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ── Upcoming View ─────────────────────────────────────────────────────────────
function UpcomingView({tasks,projects,onUpdate,onComplete,onDelete,apiKey,onTagClick}){
  const upcoming=tasks.filter(t=>!t.done&&t.when&&t.when>todayStr()).sort((a,b)=>a.when.localeCompare(b.when));
  const groups={};
  upcoming.forEach(t=>{if(!groups[t.when])groups[t.when]=[];groups[t.when].push(t);});
  if(!upcoming.length)return<div style={{textAlign:'center',padding:'60px 20px'}}><p style={{fontFamily:"'Lora',serif",fontStyle:'italic',fontSize:16,color:'#AEAEB2'}}>Nothing upcoming.</p></div>;
  return(
    <div>
      {Object.entries(groups).map(([date,ts])=>(
        <div key={date}>
          <div style={{padding:'16px 20px 4px',fontSize:11,fontFamily:"'DM Mono',monospace",fontWeight:600,color:'#AEAEB2',textTransform:'uppercase',letterSpacing:'.08em'}}>
            {new Date(date+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}
          </div>
          {ts.map(t=><TaskRow key={t.id} task={t} project={projects.find(p=>p.id===t.projectId)} projects={projects} areas={areas} onComplete={onComplete} onUpdate={onUpdate} onDelete={onDelete} showProject apiKey={apiKey} onTagClick={onTagClick}/>)}
        </div>
      ))}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App(){
  const [tasks,setTasksRaw]       =useState(()=>ls.get(SK.tasks,[]));
  const [projects,setProjectsRaw] =useState(()=>ls.get(SK.projects,[]));
  const [areas,setAreasRaw]       =useState(()=>ls.get(SK.areas,[]));
  const [headings,setHeadingsRaw] =useState(()=>ls.get(SK.headings,[]));
  const [settings,setSettingsRaw] =useState(()=>ls.get(SK.settings,{apiKey:'',googleClientId:''}));
  const [view,setView]            =useState('inbox');
  const [sheet,setSheet]          =useState(null);
  const [newProjectAreaId,setNewProjectAreaId]=useState(null);
  const [editAreaId,setEditAreaId]=useState(null);
  const [newProjectForConvert,setNewProjectForConvert]=useState(null);
  const [tagFilter,setTagFilter]  =useState(null);
  const [searchQuery,setSearchQuery]=useState('');
  const [searchFocused,setSearchFocused]=useState(false);
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [driveConnected,setDriveCon]=useState(false);
  const [syncStatus,setSyncSt]    =useState('offline');
  const [lastSync,setLastSync]    =useState(null);
  const saveRef=useRef(null);
  const apiKey=settings.apiKey||'';

  // ── Persist + Drive ──
  const queueSave=useCallback((t,p,a,h)=>{
    if(!driveConnected)return;
    clearTimeout(saveRef.current);
    saveRef.current=setTimeout(async()=>{
      setSyncSt('syncing');
      try{
        await saveToDrive({tasks:t??ls.get(SK.tasks,[]),projects:p??ls.get(SK.projects,[]),areas:a??ls.get(SK.areas,[]),headings:h??ls.get(SK.headings,[]),updatedAt:new Date().toISOString()});
        setSyncSt('idle');setLastSync(new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}));
      }catch(e){console.error(e);setSyncSt('error');}
    },1500);
  },[driveConnected]);

  const setTasks   =fn=>{const n=typeof fn==='function'?fn(tasks):fn;setTasksRaw(n);ls.set(SK.tasks,n);queueSave(n,null,null,null);};
  const setProjects=fn=>{const n=typeof fn==='function'?fn(projects):fn;setProjectsRaw(n);ls.set(SK.projects,n);queueSave(null,n,null,null);};
  const setAreas   =fn=>{const n=typeof fn==='function'?fn(areas):fn;setAreasRaw(n);ls.set(SK.areas,n);queueSave(null,null,n,null);};
  const setHeadings=fn=>{const n=typeof fn==='function'?fn(headings):fn;setHeadingsRaw(n);ls.set(SK.headings,n);queueSave(null,null,null,n);};
  const setSettings=s=>{setSettingsRaw(s);ls.set(SK.settings,s);};

  const initTC=useCallback((cid)=>{
    if(!window.google){setTimeout(()=>initTC(cid),500);return;}
    tokenClient=window.google.accounts.oauth2.initTokenClient({
      client_id:cid,scope:DRIVE_SCOPE,
      callback:async resp=>{
        if(resp.error){setSyncSt('error');return;}
        gToken=resp.access_token;setDriveCon(true);setSyncSt('syncing');
        try{
          const data=await loadFromDrive();
          if(data){
            if(data.tasks){setTasksRaw(data.tasks);ls.set(SK.tasks,data.tasks);}
            if(data.projects){setProjectsRaw(data.projects);ls.set(SK.projects,data.projects);}
            if(data.areas){setAreasRaw(data.areas);ls.set(SK.areas,data.areas);}
            if(data.headings){setHeadingsRaw(data.headings);ls.set(SK.headings,data.headings);}
          }else{
            await saveToDrive({tasks:ls.get(SK.tasks,[]),projects:ls.get(SK.projects,[]),areas:ls.get(SK.areas,[]),headings:ls.get(SK.headings,[]),updatedAt:new Date().toISOString()});
          }
          setSyncSt('idle');setLastSync(new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}));
        }catch(e){console.error(e);setSyncSt('error');}
      }
    });
  },[]);
  const connectDrive=useCallback(cid=>{const c=cid||settings.googleClientId;if(!c){setSheet('settings');return;}initTC(c);setTimeout(()=>{if(tokenClient)tokenClient.requestAccessToken();},600);},[settings.googleClientId,initTC]);
  const disconnectDrive=()=>{gToken=null;driveFileId=null;tokenClient=null;setDriveCon(false);setSyncSt('offline');};

  // ── Task ops ──
  const addTask=f=>{
    const t={id:uid(),title:f.title,notes:f.notes||'',projectId:f.projectId||null,areaId:f.areaId||null,headingId:f.headingId||null,section:f.section||'inbox',when:f.when||null,deadline:f.deadline||null,tags:f.tags||[],checklist:f.checklist||[],done:false,doneAt:null,createdAt:new Date().toISOString(),updatedAt:null};
    setTasks(ts=>[t,...ts]);return t;
  };
  const addMany=items=>{
    const newT=items.map(f=>({id:uid(),title:f.title,notes:f.notes||'',projectId:null,areaId:null,headingId:null,section:f.section||'inbox',when:f.when||null,deadline:f.deadline||null,tags:[],checklist:[],done:false,doneAt:null,createdAt:new Date().toISOString(),updatedAt:null}));
    setTasks(ts=>[...newT,...ts]);
  };
  const updateTask=upd=>setTasks(ts=>ts.map(t=>t.id===upd.id?{...upd,updatedAt:new Date().toISOString()}:t));
  const completeTask=id=>setTasks(ts=>ts.map(t=>t.id===id?{...t,done:true,doneAt:new Date().toISOString()}:t));
  const deleteTask=id=>setTasks(ts=>ts.filter(t=>t.id!==id));

  // ── Project ops ──
  const addProject=(fields)=>{
    const p={id:uid(),title:fields.title,areaId:fields.areaId||null,color:fields.color||COLORS[0],notes:'',status:'active',createdAt:new Date().toISOString()};
    setProjects(ps=>[...ps,p]);
    if(fields.plan){
      let newH=[],newT=[];
      fields.plan.forEach(sec=>{
        let hId=null;
        if(sec.heading){hId=uid();newH.push({id:hId,projectId:p.id,title:sec.heading,createdAt:new Date().toISOString()});}
        sec.tasks.forEach(title=>newT.push({id:uid(),title,notes:'',projectId:p.id,areaId:fields.areaId||null,headingId:hId,section:'anytime',when:null,deadline:null,tags:[],checklist:[],done:false,doneAt:null,createdAt:new Date().toISOString(),updatedAt:null}));
      });
      if(newH.length)setHeadings(hs=>[...hs,...newH]);
      if(newT.length)setTasks(ts=>[...ts,...newT]);
    }
    setView(`project:${p.id}`);
    setSheet(null);
  };
  const addArea=f=>{setAreas(as=>[...as,{id:uid(),name:f.name,createdAt:new Date().toISOString()}]);};
  const updateArea=upd=>setAreas(as=>as.map(a=>a.id===upd.id?{...a,...upd}:a));
  const deleteArea=id=>{
    setAreas(as=>as.filter(a=>a.id!==id));
    // Detach projects from area (keep them as standalone)
    setProjects(ps=>ps.map(p=>p.areaId===id?{...p,areaId:null}:p));
    if(view===`area:${id}`) setView('inbox');
  };
  const updateProject=upd=>setProjects(ps=>ps.map(p=>p.id===upd.id?{...p,...upd}:p));
  const deleteProject=id=>{
    setProjects(ps=>ps.filter(p=>p.id!==id));
    // Move project tasks to inbox
    setTasks(ts=>ts.map(t=>t.projectId===id?{...t,projectId:null,headingId:null,section:'inbox'}:t));
    setHeadings(hs=>hs.filter(h=>h.projectId!==id));
    setView('inbox');
  };
  const addHeading=projectId=>{setHeadings(hs=>[...hs,{id:uid(),projectId,title:'New Heading',createdAt:new Date().toISOString()}]);};
  const convertToProject=task=>{
    // Create a new project from the task
    const p={id:uid(),title:task.title,areaId:null,color:COLORS[0],notes:task.notes||'',status:'active',createdAt:new Date().toISOString()};
    setProjects(ps=>[...ps,p]);
    // Remove the original task (it becomes the project itself)
    setTasks(ts=>ts.filter(t=>t.id!==task.id));
    // Navigate to the new project and open edit sheet to let user pick area
    setView(`project:${p.id}`);
    setNewProjectForConvert(p.id);
  };

  // ── View logic ──
  const today=todayStr();
  const isProj=view.startsWith('project:');
  const projId=isProj?view.replace('project:',''):null;
  const curProj=projId?projects.find(p=>p.id===projId):null;
  const isArea=view.startsWith('area:');
  const areaId=isArea?view.replace('area:',''):null;
  const curArea=areaId?areas.find(a=>a.id===areaId):null;
  const editAreaObj=editAreaId?areas.find(a=>a.id===editAreaId):null;

  const viewTasks=useMemo(()=>{
    switch(view){
      case 'inbox':    return tasks.filter(t=>!t.done&&t.section==='inbox');
      case 'today':    return tasks.filter(t=>!t.done&&((t.when&&t.when<=today)||(t.deadline&&t.deadline<=today&&!t.when)));
      case 'upcoming': return tasks.filter(t=>!t.done&&t.when&&t.when>today).sort((a,b)=>a.when.localeCompare(b.when));
      case 'anytime':  return tasks.filter(t=>!t.done&&t.section==='anytime'&&!t.when&&!t.projectId);
      case 'someday':  return tasks.filter(t=>!t.done&&t.section==='someday');
      case 'logbook':  return tasks.filter(t=>t.done);
      default:return[];
    }
  },[tasks,view,today]);

  const VIEW_LABELS={inbox:'Inbox',today:'Today',upcoming:'Upcoming',anytime:'Anytime',someday:'Someday',logbook:'Logbook'};

  // Search results
  const searchResults=useMemo(()=>{
    if(!searchQuery.trim())return null;
    const q=searchQuery.toLowerCase();
    return tasks.filter(t=>!t.done&&(t.title.toLowerCase().includes(q)||(t.notes||'').toLowerCase().includes(q)||(t.tags||[]).some(tag=>tag.toLowerCase().includes(q))));
  },[tasks,searchQuery]);

  // Tag filter results
  const tagResults=useMemo(()=>{
    if(!tagFilter)return null;
    return tasks.filter(t=>!t.done&&(t.tags||[]).includes(tagFilter));
  },[tasks,tagFilter]);
  const syncColor={idle:'#34C759',syncing:'#FF9500',error:'#FF3B30',offline:'#C7C7CC'}[syncStatus]||'#C7C7CC';

  const sharedListProps={projects,areas,onComplete:completeTask,onUpdate:updateTask,onDelete:deleteTask,showProject:true,apiKey,onTagClick:setTagFilter,onConvertToProject:convertToProject};

  return(
    <div className="shell">
      {sidebarOpen&&<div className="mob-overlay" onClick={()=>setSidebarOpen(false)}/>}
      <div className={`sidebar${sidebarOpen?' open':''}`}>
        <Sidebar view={view} setView={setView} areas={areas} projects={projects} tasks={tasks}
          onNewProject={(aId)=>{setNewProjectAreaId(aId||null);setSheet('newProject');}} onNewArea={()=>setSheet('newArea')} onEditArea={(aId)=>{setEditAreaId(aId);setSheet('editArea');}} setSidebarOpen={setSidebarOpen} tagFilter={tagFilter} setTagFilter={setTagFilter}
        />
      </div>
      <div className="main">
        {/* Top bar */}
        <div style={{background:'#fff',borderBottom:'1px solid #E5E5EA',padding:'10px 14px',display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
          <button className="hamburger" onClick={()=>setSidebarOpen(v=>!v)} style={{background:'none',border:'none',fontSize:20,cursor:'pointer',color:'#6B6B6B',padding:'2px 6px',lineHeight:1}}>☰</button>
          {searchQuery||searchFocused?(
            <div style={{flex:1,display:'flex',alignItems:'center',gap:6,background:'#F2F2F7',borderRadius:9,padding:'6px 10px'}}>
              <span style={{color:'#AEAEB2',fontSize:14}}>🔍</span>
              <input autoFocus value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}
                onFocus={()=>setSearchFocused(true)}
                onBlur={()=>{if(!searchQuery)setSearchFocused(false);}}
                onKeyDown={e=>{if(e.key==='Escape'){setSearchQuery('');setSearchFocused(false);}}}
                placeholder="Search tasks, projects…"
                style={{flex:1,border:'none',background:'transparent',fontSize:14,fontFamily:"'Lora',serif",color:'#1C1C1E',padding:0}}
              />
              {searchQuery&&<span onClick={()=>{setSearchQuery('');setSearchFocused(false);}} style={{color:'#AEAEB2',cursor:'pointer',fontSize:16,lineHeight:1}}>×</span>}
            </div>
          ):(
            <h2 style={{flex:1,margin:0,fontSize:20,fontFamily:"'Lora',serif",fontWeight:500,color:'#1C1C1E',cursor:'text'}} onClick={()=>setSearchFocused(true)}>
              {tagFilter?`#${tagFilter}`:curProj?curProj.title:curArea?curArea.name:VIEW_LABELS[view]||'Things'}
            </h2>
          )}
          {tagFilter&&<button onClick={()=>setTagFilter(null)} style={{background:'#EBF3FF',border:'none',borderRadius:6,padding:'4px 10px',color:'#4B8EF7',fontSize:11,fontFamily:"'DM Mono',monospace",cursor:'pointer'}}>✕ clear</button>}
          <div style={{display:'flex',alignItems:'center',gap:5}}>
            {!searchQuery&&!searchFocused&&<button onClick={()=>setSearchFocused(true)} style={{background:'none',border:'none',fontSize:16,cursor:'pointer',color:'#AEAEB2',padding:'2px'}}>🔍</button>}
            <div style={{width:7,height:7,borderRadius:'50%',background:syncColor}}/>
            {!settings.apiKey&&<span style={{fontSize:11,color:'#FF3B30',fontFamily:"'DM Mono',monospace",cursor:'pointer'}} onClick={()=>setSheet('settings')}>⚠</span>}
            <button onClick={()=>setSheet('settings')} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:'#AEAEB2',padding:'2px'}}>⚙</button>
          </div>
        </div>
        {/* Content */}
        <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
          {isProj&&curProj&&(
            <ProjectView
              project={curProj} tasks={tasks} headings={headings.filter(h=>h.projectId===projId)}
              areas={areas} projects={projects} apiKey={apiKey}
              onAddTask={addTask} onUpdateTask={updateTask} onCompleteTask={completeTask} onDeleteTask={deleteTask}
              onAddHeading={addHeading} onUpdateHeading={h=>setHeadings(hs=>hs.map(x=>x.id===h.id?h:x))}
              onUpdateProject={updateProject} onDeleteProject={deleteProject}
              autoEdit={newProjectForConvert===projId}
              onAutoEditDone={()=>setNewProjectForConvert(null)}
            />
          )}
          {isArea&&curArea&&(
            <AreaView
              area={curArea} projects={projects} tasks={tasks} areas={areas} apiKey={apiKey}
              onAddProject={f=>addProject({...f,areaId:curArea.id})}
              onUpdateArea={updateArea} onDeleteArea={deleteArea}
              onGoProject={id=>setView(`project:${id}`)}
              onUpdateProject={updateProject} onDeleteProject={deleteProject}
            />
          )}
          {(searchResults||tagResults)&&(
            <div style={{padding:'16px 0 100px'}}>
              <div style={{padding:'0 20px 14px',display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:12,fontFamily:"'DM Mono',monospace",color:'#AEAEB2',textTransform:'uppercase',letterSpacing:'.08em'}}>
                  {searchResults?`${searchResults.length} result${searchResults.length!==1?'s':''}`:tagResults?`${tagResults.length} task${tagResults.length!==1?'s':''} tagged #${tagFilter}`:''}
                </span>
              </div>
              {(searchResults||tagResults).map(t=>(
                <TaskRow key={t.id} task={t} project={projects.find(p=>p.id===t.projectId)} {...sharedListProps} onTagClick={setTagFilter}/>
              ))}
              {(searchResults||tagResults).length===0&&(
                <div style={{textAlign:'center',padding:'48px 20px'}}>
                  <p style={{fontFamily:"'Lora',serif",fontStyle:'italic',fontSize:16,color:'#AEAEB2'}}>No results found.</p>
                </div>
              )}
            </div>
          )}
          {!searchResults&&!tagResults&&!isProj&&!isArea&&(
            <div style={{padding:'24px 0 100px'}}>
              <h1 style={{margin:'0 20px 18px',fontSize:28,fontFamily:"'Lora',serif",fontWeight:500,color:'#1C1C1E'}}>{VIEW_LABELS[view]}</h1>
              {view==='logbook'&&<LogbookView tasks={tasks} projects={projects}/>}
              {view==='upcoming'&&<UpcomingView tasks={viewTasks} projects={projects} onUpdate={updateTask} onComplete={completeTask} onDelete={deleteTask} apiKey={apiKey} onTagClick={setTagFilter}/>}
              {view==='today'&&(
                <TodayView tasks={viewTasks} projects={projects} {...sharedListProps} onTagClick={setTagFilter} onAddTask={addTask}/>
              )}
              {view!=='logbook'&&view!=='upcoming'&&view!=='today'&&(
                <>
                  {viewTasks.length===0&&view!=='inbox'&&view!=='anytime'&&(
                    <div style={{textAlign:'center',padding:'48px 20px'}}>
                      <p style={{fontFamily:"'Lora',serif",fontStyle:'italic',fontSize:16,color:'#AEAEB2'}}>
                        {view==='someday'?'Nothing parked for someday.':'No items here.'}
                      </p>
                    </div>
                  )}
                  {viewTasks.map(t=>(
                    <TaskRow key={t.id} task={t} project={projects.find(p=>p.id===t.projectId)} {...sharedListProps} onTagClick={setTagFilter}/>
                  ))}
                  {(view==='inbox'||view==='anytime')&&(
                    <NewTaskRow onAdd={f=>addTask({...f,section:view})} placeholder="New To-Do" section={view}/>
                  )}
                </>
              )}
            </div>
          )}
        </div>
      </div>

      {/* FABs */}
      <div style={{position:'fixed',bottom:24,right:20,display:'flex',flexDirection:'column',gap:10,zIndex:5}}>
        <button className="fab" style={{background:'#FF9500',boxShadow:'0 4px 16px rgba(255,149,0,.4)'}} onClick={()=>setSheet('dump')}>✦ Brain dump</button>
      </div>

      {/* Sheets */}
      {sheet==='settings'&&<Settings settings={settings} onSave={setSettings} driveConnected={driveConnected} onConnect={connectDrive} onDisconnect={disconnectDrive} onClose={()=>setSheet(null)}/>}
      {sheet==='dump'&&<BrainDump apiKey={apiKey} onSaveAll={addMany} onClose={()=>setSheet(null)}/>}
      {sheet==='newProject'&&<NewProjectSheet areas={areas} apiKey={apiKey} initialAreaId={newProjectAreaId} onSave={addProject} onClose={()=>setSheet(null)}/>}
      {sheet==='newArea'&&<NewAreaSheet onSave={addArea} onClose={()=>setSheet(null)}/>}
      {sheet==='editArea'&&editAreaObj&&<EditAreaSheet area={editAreaObj} onSave={upd=>{updateArea(upd);setSheet(null);}} onDelete={id=>{deleteArea(id);setSheet(null);}} onClose={()=>setSheet(null)}/>}
    </div>
  );
}

// ── CSS fix for desktop sidebar always visible ────────────────────────────────
const desktopStyle=document.createElement('style');
desktopStyle.textContent=`
@media(min-width:661px){
  .sidebar{transform:translateX(0)!important;}
}`;
document.head.appendChild(desktopStyle);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
