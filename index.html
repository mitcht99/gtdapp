// ─── Todoist API Layer ─────────────────────────────────────────────
// All requests go via Sync API v9 with token in the POST body
// (not the Authorization header) to avoid CORS preflight entirely.
// POST with application/x-www-form-urlencoded + no custom headers = "simple request" = no OPTIONS.
const TodoistAPI = {
  token: null,
  SYNC_URL: 'https://api.todoist.com/api/v1/sync',
  
  setToken(t) { this.token = t; },
  
  async _post(params) {
    params.append('token', this.token);
    try {
      const r = await fetch(this.SYNC_URL, {
        method: 'POST',
        body: params
      });
      if (r.status === 401 || r.status === 403) throw new Error(`Auth failed (${r.status}) — check your API token`);
      if (!r.ok) { const t = await r.text().catch(() => ''); throw new Error(`API error ${r.status}: ${t}`); }
      return r.json();
    } catch(e) {
      if (e.message.startsWith('Auth') || e.message.startsWith('API')) throw e;
      throw new Error(`Network error: ${e.message}`);
    }
  },

  async syncAll() {
    const p = new URLSearchParams();
    p.append('sync_token', '*');
    p.append('resource_types', '["items","projects","sections","labels"]');
    const r = await this._post(p);
    const tasks = (r.items || []).filter(i => !i.checked && !i.is_deleted).map(i => ({
      id: i.id, content: i.content, description: i.description || '',
      priority: i.priority, project_id: i.project_id, section_id: i.section_id,
      parent_id: i.parent_id, labels: i.labels || [], order: i.child_order,
      due: i.due, created_at: i.added_at,
      url: `https://app.todoist.com/showTask?id=${i.id}`
    }));
    const projects = (r.projects || []).filter(p => !p.is_deleted && !p.is_archived);
    const sections = (r.sections || []).filter(s => !s.is_deleted && !s.is_archived);
    const labels = (r.labels || []).filter(l => !l.is_deleted);
    return { tasks, projects, sections, labels };
  },

  async testConnection() {
    const p = new URLSearchParams();
    p.append('sync_token', '*');
    p.append('resource_types', '["user"]');
    const r = await this._post(p);
    return r.user;
  },
  
  async _command(type, args) {
    const uuid = crypto.randomUUID();
    const p = new URLSearchParams();
    p.append('commands', JSON.stringify([{ type, uuid, args }]));
    const r = await this._post(p);
    if (r.sync_status && r.sync_status[uuid] !== 'ok') {
      const err = r.sync_status[uuid];
      throw new Error(`Command failed: ${typeof err === 'object' ? JSON.stringify(err) : err}`);
    }
    return r;
  },

  async completeTask(id) {
    return this._command('item_close', { id });
  },
  
  async updateTask(id, data) {
    return this._command('item_update', { id, ...data });
  },
  
  async createTask(data) {
    const temp_id = crypto.randomUUID();
    const uuid = crypto.randomUUID();
    const args = { content: data.content };
    if (data.project_id) args.project_id = data.project_id;
    if (data.labels) args.labels = data.labels;
    if (data.due_string) args.due = { string: data.due_string };
    if (data.priority) args.priority = data.priority;
    if (data.description) args.description = data.description;
    
    const p = new URLSearchParams();
    p.append('commands', JSON.stringify([{ type: 'item_add', temp_id, uuid, args }]));
    const r = await this._post(p);
    if (r.sync_status && r.sync_status[uuid] !== 'ok') {
      throw new Error(`Create failed: ${JSON.stringify(r.sync_status[uuid])}`);
    }
    const realId = r.temp_id_mapping?.[temp_id] || temp_id;
    return { id: realId, content: args.content, description: args.description || '',
      priority: args.priority || 1, project_id: args.project_id || null,
      section_id: null, parent_id: null, labels: args.labels || [],
      order: 0, due: null, created_at: new Date().toISOString(),
      url: `https://app.todoist.com/showTask?id=${realId}` };
  }
};

// ─── AI API Layer ──────────────────────────────────────────────────
const ClaudeAPI = {
  key: null,
  setKey(k) { this.key = k; },
  
  async clarify(taskContent, fuzzyType) {
    if (!this.key) throw new Error('No Anthropic API key configured');
    
    const prompts = {
      vague: `I captured this fuzzy item: "${taskContent}". I know roughly what area of my life it relates to, but I can't define what "done" looks like or what to do first. Help me by:\n1. Asking me what outcome I actually want (push me to be specific)\n2. Helping me find the very first physical action (under 15 min)\n3. Suggesting whether this is a single action or a project\n4. Recommending context labels from my system: @computer, @phone, @errands, @work, @home, @low-energy, @ai-session, @waiting, @someday`,
      avoidance: `I have a task I keep avoiding: "${taskContent}". It's been on my list for a while and I skip past it every time. Help me by:\n1. Asking me what specifically feels uncomfortable about it\n2. Reality-checking: what actually happens if I do this? What happens if I keep avoiding it?\n3. Finding the absolute smallest entry point\n4. If it involves another person, help me draft the opening line\n\nBe honest with me.`,
      tangled: `I have this item that feels overwhelming because it's actually multiple things tangled together: "${taskContent}". Help me by:\n1. Pulling it apart — list every distinct sub-item hiding inside it\n2. For each piece: is it a single action, a project, or noise?\n3. Which pieces are independent vs dependent?\n4. Give me just the FIRST next action for the most important piece\n5. Suggest context and people labels for each piece`,
      decision: `I'm stuck deciding on: "${taskContent}". Help me by:\n1. Asking me what my options are\n2. For each option, best and worst realistic outcomes\n3. Is this reversible? What's the actual cost of choosing wrong?\n4. Push me to decide right now if I have enough info\n\nDon't be diplomatic. Be the friend who says "just pick one."`,
      research: `I have this item I can't act on because I don't know enough yet: "${taskContent}". Help me by:\n1. Asking me what specific question I need answered\n2. Turning it into a concrete, time-boxed task (30-60 min max)\n3. Defining what "enough research" looks like\n4. Warning me if this sounds like procrastination disguised as research`,
      notmine: `I have this item that I'm not sure is actually my responsibility: "${taskContent}". Help me by:\n1. Asking me whose job this really is\n2. If it IS partly mine: what specifically is my piece?\n3. If I need to delegate: help me draft the message\n4. If I need to let go: give me permission to delete it`
    };
    
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': this.key, 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        messages: [{ role: 'user', content: prompts[fuzzyType] || prompts.vague }]
      })
    });
    if (!r.ok) { const e = await r.text(); throw new Error(`Claude API error: ${e}`); }
    const data = await r.json();
    return data.content?.[0]?.text || 'No response';
  }
};

// ─── Filter Definitions ────────────────────────────────────────────
const VIEWS = {
  inbox: { name: 'Inbox', icon: '◻', filter: t => t.labels.length === 0 && !t.section_id },
  next: { name: 'Next actions', icon: '▸', filter: t => !t.labels.includes('waiting') && !t.labels.includes('someday') && !t.labels.includes('blocked') },
  today: { name: 'Today', icon: '◉', filter: t => t.due?.date === new Date().toISOString().slice(0,10) },
  work: { name: 'Work context', icon: '⊞', filter: t => t.labels.includes('work') && !t.labels.includes('waiting') },
  home: { name: 'Home context', icon: '⌂', filter: t => (t.labels.includes('home') || t.labels.includes('computer') || t.labels.includes('low-energy')) && !t.labels.includes('waiting') },
  waiting: { name: 'Waiting for', icon: '◷', filter: t => t.labels.includes('waiting') },
  someday: { name: 'Someday / maybe', icon: '☁', filter: t => t.labels.includes('someday') },
  ai: { name: 'AI sessions', icon: '⬡', filter: t => t.labels.includes('ai-session') },
  quickwins: { name: 'Quick wins', icon: '⚡', filter: t => t.labels.includes('quick-win') && !t.labels.includes('waiting') },
  overdue: { name: 'Overdue', icon: '⚠', filter: t => t.due?.date && t.due.date < new Date().toISOString().slice(0,10) },
  stale: { name: 'Stale items', icon: '◌', filter: t => { 
    if (t.due) return false; 
    const created = new Date(t.created_at); 
    const daysOld = (Date.now() - created) / 86400000; 
    return daysOld > 14; 
  }},
  thisweek: { name: 'This week', icon: '▦', filter: t => {
    if (!t.due?.date) return false;
    const d = new Date(t.due.date);
    const now = new Date(); 
    const end = new Date(); end.setDate(end.getDate() + 7);
    return d >= now && d <= end;
  }},
};

const AGENDA_KEY = '_agendas';

function isPersonLabel(l) {
  return /^[A-Z]/.test(l) && !['Work','Home','Dev','Finance','Someday'].includes(l);
}

// ─── Label Color Map ───────────────────────────────────────────────
const LABEL_COLORS = {
  waiting: 'var(--purple-dim)', someday: 'var(--blue-dim)',
  'ai-session': 'var(--bg-accent-dim)', 'quick-win': 'var(--green-dim)',
  blocked: 'var(--red-dim)', work: null, home: null, computer: null,
  phone: null, errands: null, 'low-energy': null
};

function labelColor(l) {
  if (LABEL_COLORS[l] !== undefined) return LABEL_COLORS[l];
  if (isPersonLabel(l)) return 'var(--purple-dim)';
  return null;
}

// ─── Setup Screen ──────────────────────────────────────────────────
function SetupScreen({ onSave }) {
  const [todoistKey, setTodoistKey] = useState('');
  const [claudeKey, setClaudeKey] = useState('');
  const [testing, setTesting] = useState(false);
  const [error, setError] = useState('');

  async function handleTest() {
    if (!todoistKey.trim()) { setError('Todoist API token is required'); return; }
    if (window.location.protocol === 'file:') {
      setError('Cannot connect from a file:// URL — browsers block API requests from local files. Either serve this with "python -m http.server 8000" and open http://localhost:8000, or deploy to GitHub Pages.');
      return;
    }
    setTesting(true); setError('');
    try {
      TodoistAPI.setToken(todoistKey.trim());
      const user = await TodoistAPI.testConnection();
      onSave(todoistKey.trim(), claudeKey.trim(), user?.full_name);
    } catch(e) {
      const msg = e.message === 'Failed to fetch' 
        ? 'Network error — check your internet connection and that the API token is correct. If opening from a local file, serve via HTTP instead (python -m http.server 8000).'
        : `Connection failed: ${e.message}`;
      setError(msg);
    }
    setTesting(false);
  }

  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'var(--bg-root)'}}>
      <div style={{width:'100%',maxWidth:'400px',padding:'32px'}}>
        <div style={{marginBottom:'32px'}}>
          <div style={{fontSize:'24px',fontWeight:600,color:'var(--text-accent)',letterSpacing:'-0.5px',marginBottom:'4px'}}>
            GTD Dashboard
          </div>
          <div style={{fontSize:'13px',color:'var(--text-tertiary)'}}>
            Connect your Todoist account to get started
          </div>
        </div>

        <div style={{marginBottom:'16px'}}>
          <div style={{fontSize:'12px',fontWeight:500,color:'var(--text-secondary)',marginBottom:'6px'}}>
            Todoist API token *
          </div>
          <input style={S.input} type="password" value={todoistKey}
            onChange={e => setTodoistKey(e.target.value)}
            placeholder="Paste from Settings → Integrations → Developer" />
          <div style={{fontSize:'11px',color:'var(--text-tertiary)',marginTop:'4px'}}>
            Find this in Todoist → Settings → Integrations → Developer
          </div>
        </div>

        <div style={{marginBottom:'24px'}}>
          <div style={{fontSize:'12px',fontWeight:500,color:'var(--text-secondary)',marginBottom:'6px'}}>
            Anthropic API key (optional)
          </div>
          <input style={S.input} type="password" value={claudeKey}
            onChange={e => setClaudeKey(e.target.value)}
            placeholder="sk-ant-... (for AI features)" />
          <div style={{fontSize:'11px',color:'var(--text-tertiary)',marginTop:'4px'}}>
            Enables AI clarify, review, and planning features
          </div>
        </div>

        {error && (
          <div style={{fontSize:'12px',color:'var(--red)',marginBottom:'12px',padding:'8px 12px',
            background:'var(--red-dim)',borderRadius:'6px'}}>{error}</div>
        )}

        <button style={S.btn('primary')} onClick={handleTest}
          disabled={testing}>
          {testing ? 'Testing connection...' : 'Connect & start'}
        </button>
      </div>
    </div>
  );
}

// ─── Quick Add ─────────────────────────────────────────────────────
function QuickAdd({ onAdd, labels }) {
  const [text, setText] = useState('');
  const [showLabels, setShowLabels] = useState(false);
  const [selectedLabels, setSelectedLabels] = useState([]);
  const inputRef = useRef(null);

  function toggleLabel(l) {
    setSelectedLabels(prev => prev.includes(l) ? prev.filter(x => x !== l) : [...prev, l]);
  }

  async function handleSubmit(e) {
    e.preventDefault();
    if (!text.trim()) return;
    try {
      await onAdd({ content: text.trim(), labels: selectedLabels });
      setText(''); setSelectedLabels([]); setShowLabels(false);
    } catch(err) { console.error(err); }
  }

  return (
    <div style={S.quickAdd}>
      <form onSubmit={handleSubmit} style={{display:'flex',gap:'8px',alignItems:'center'}}>
        <input ref={inputRef} style={{...S.input, flex:1}} value={text}
          onChange={e => setText(e.target.value)}
          placeholder="Quick add task..." />
        <button type="button" style={S.btn()} onClick={() => setShowLabels(!showLabels)}>
          @{selectedLabels.length > 0 ? ` ${selectedLabels.length}` : ''}
        </button>
        <button type="submit" style={S.btn('primary')}>Add</button>
      </form>
      {showLabels && (
        <div style={{display:'flex',gap:'4px',flexWrap:'wrap',marginTop:'8px',paddingTop:'8px',
          borderTop:'1px solid var(--border)'}}>
          {labels.map(l => (
            <button key={l.name} onClick={() => toggleLabel(l.name)}
              style={{...S.label(selectedLabels.includes(l.name) ? 'var(--bg-accent-dim)' : labelColor(l.name)),
                cursor:'pointer', border: selectedLabels.includes(l.name) ? '1px solid var(--bg-accent)' : '1px solid transparent'}}>
              @{l.name}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── Task Item ─────────────────────────────────────────────────────
function TaskItem({ task, onComplete, projects, onSelect, selected }) {
  const isOverdue = task.due?.date && task.due.date < new Date().toISOString().slice(0,10);
  const project = projects.find(p => p.id === task.project_id);
  const daysOld = Math.floor((Date.now() - new Date(task.created_at)) / 86400000);

  return (
    <div style={{...S.taskItem(task.priority), background: selected ? 'var(--bg-hover)' : 'transparent'}}
      onClick={() => onSelect?.(task)}
      onMouseEnter={e => { if (!selected) e.currentTarget.style.background = 'var(--bg-hover)'; }}
      onMouseLeave={e => { if (!selected) e.currentTarget.style.background = 'transparent'; }}>
      <div style={S.checkbox(false)} onClick={e => { e.stopPropagation(); onComplete(task.id); }}
        onMouseEnter={e => e.currentTarget.style.borderColor = 'var(--green)'}
        onMouseLeave={e => e.currentTarget.style.borderColor = 'var(--border-hover)'}>
      </div>
      <div style={S.taskContent}>
        <div style={S.taskTitle(false)}>{task.content}</div>
        <div style={S.taskMeta}>
          {project && (
            <span style={S.label()}>
              {project.name}
            </span>
          )}
          {task.labels.map(l => (
            <span key={l} style={S.label(labelColor(l))}>@{l}</span>
          ))}
          {task.due?.date && (
            <span style={S.dueDate(isOverdue)}>
              {isOverdue ? '⚠ ' : ''}{task.due.date}
            </span>
          )}
          {daysOld > 14 && !task.due && (
            <span style={{fontSize:'11px',color:'var(--text-tertiary)',fontFamily:'var(--font-mono)'}}>
              {daysOld}d old
            </span>
          )}
        </div>
        {task.description && (
          <div style={{fontSize:'12px',color:'var(--text-tertiary)',marginTop:'4px',
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {task.description}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Task Detail Panel ─────────────────────────────────────────────
function TaskDetail({ task, onClose, onComplete, onUpdate, projects, labels, claudeKey }) {
  const [aiResponse, setAiResponse] = useState('');
  const [aiLoading, setAiLoading] = useState(false);
  const [fuzzyType, setFuzzyType] = useState('vague');
  const project = projects.find(p => p.id === task.project_id);

  async function handleClarify() {
    setAiLoading(true); setAiResponse('');
    try {
      const response = await ClaudeAPI.clarify(task.content, fuzzyType);
      setAiResponse(response);
    } catch(e) { setAiResponse(`Error: ${e.message}`); }
    setAiLoading(false);
  }

  async function handleToggleLabel(label) {
    const newLabels = task.labels.includes(label) 
      ? task.labels.filter(l => l !== label)
      : [...task.labels, label];
    await onUpdate(task.id, { labels: newLabels });
  }

  return (
    <div style={{width:'380px',minWidth:'380px',borderLeft:'1px solid var(--border)',
      background:'var(--bg-surface)',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)',
        display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
        <span style={{fontSize:'12px',fontWeight:500,color:'var(--text-tertiary)',textTransform:'uppercase',
          letterSpacing:'0.5px'}}>Task detail</span>
        <button onClick={onClose} style={{color:'var(--text-tertiary)',fontSize:'18px',
          lineHeight:1,padding:'4px'}}>×</button>
      </div>
      
      <div style={{flex:1,overflowY:'auto',padding:'20px'}}>
        <div style={{fontSize:'15px',fontWeight:500,marginBottom:'16px',lineHeight:1.4}}>
          {task.content}
        </div>
        
        {task.description && (
          <div style={{fontSize:'13px',color:'var(--text-secondary)',marginBottom:'16px',
            lineHeight:1.6,whiteSpace:'pre-wrap'}}>{task.description}</div>
        )}
        
        <div style={{marginBottom:'16px'}}>
          <div style={{fontSize:'11px',fontWeight:600,color:'var(--text-tertiary)',
            textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'8px'}}>Project</div>
          <span style={S.label()}>{project?.name || 'Inbox'}</span>
        </div>
        
        <div style={{marginBottom:'16px'}}>
          <div style={{fontSize:'11px',fontWeight:600,color:'var(--text-tertiary)',
            textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'8px'}}>Labels</div>
          <div style={{display:'flex',gap:'4px',flexWrap:'wrap'}}>
            {labels.map(l => (
              <button key={l.name} onClick={() => handleToggleLabel(l.name)}
                style={{...S.label(task.labels.includes(l.name) ? (labelColor(l.name) || 'var(--bg-accent-dim)') : null),
                  cursor:'pointer',
                  border: task.labels.includes(l.name) ? '1px solid var(--bg-accent)' : '1px solid var(--border)',
                  opacity: task.labels.includes(l.name) ? 1 : 0.6}}>
                @{l.name}
              </button>
            ))}
          </div>
        </div>
        
        {task.due && (
          <div style={{marginBottom:'16px'}}>
            <div style={{fontSize:'11px',fontWeight:600,color:'var(--text-tertiary)',
              textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'8px'}}>Due date</div>
            <span style={{fontSize:'13px',fontFamily:'var(--font-mono)',
              color: task.due.date < new Date().toISOString().slice(0,10) ? 'var(--red)' : 'var(--text-secondary)'}}>
              {task.due.date}{task.due.is_recurring ? ' (recurring)' : ''}
            </span>
          </div>
        )}

        <div style={{fontSize:'11px',color:'var(--text-tertiary)',fontFamily:'var(--font-mono)',marginBottom:'20px'}}>
          Created {new Date(task.created_at).toLocaleDateString()} ({Math.floor((Date.now() - new Date(task.created_at)) / 86400000)}d ago)
        </div>

        <div style={{display:'flex',gap:'8px',marginBottom:'20px'}}>
          <button style={S.btn('primary')} onClick={() => onComplete(task.id)}>
            Complete
          </button>
          <a href={task.url} target="_blank" rel="noopener noreferrer"
            style={{...S.btn(),textDecoration:'none',display:'inline-flex',alignItems:'center'}}>
            Open in Todoist
          </a>
        </div>

        {claudeKey && (
          <div style={{borderTop:'1px solid var(--border)',paddingTop:'16px'}}>
            <div style={{fontSize:'11px',fontWeight:600,color:'var(--text-accent)',
              textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'10px'}}>
              AI Clarify
            </div>
            <div style={{display:'flex',gap:'4px',flexWrap:'wrap',marginBottom:'10px'}}>
              {['vague','avoidance','tangled','decision','research','notmine'].map(ft => (
                <button key={ft} onClick={() => setFuzzyType(ft)}
                  style={{...S.label(ft === fuzzyType ? 'var(--bg-accent-dim)' : null),
                    cursor:'pointer',border: ft === fuzzyType ? '1px solid var(--bg-accent)' : '1px solid var(--border)'}}>
                  {ft}
                </button>
              ))}
            </div>
            <button style={S.btn('primary')} onClick={handleClarify} disabled={aiLoading}>
              {aiLoading ? 'Thinking...' : `Clarify as ${fuzzyType}`}
            </button>
            {aiResponse && (
              <div style={{marginTop:'12px',fontSize:'13px',color:'var(--text-secondary)',
                lineHeight:1.7,whiteSpace:'pre-wrap',background:'var(--bg-elevated)',
                padding:'12px',borderRadius:'8px',maxHeight:'300px',overflowY:'auto'}}>
                {aiResponse}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Main App ──────────────────────────────────────────────────────
function App() {
  const [authed, setAuthed] = useState(false);
  const [tasks, setTasks] = useState([]);
  const [projects, setProjects] = useState([]);
  const [sections, setSections] = useState([]);
  const [labels, setLabels] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [view, setView] = useState('next');
  const [selectedTask, setSelectedTask] = useState(null);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [claudeKey, setClaudeKey] = useState('');
  const [lastRefresh, setLastRefresh] = useState(null);

  // Check saved credentials
  useEffect(() => {
    const tk = localStorage.getItem('gtd_todoist_key');
    const ck = localStorage.getItem('gtd_claude_key');
    if (tk) {
      TodoistAPI.setToken(tk);
      if (ck) { ClaudeAPI.setKey(ck); setClaudeKey(ck); }
      setAuthed(true);
    }
  }, []);

  function handleSetup(todoistKey, claudeApiKey, userName) {
    localStorage.setItem('gtd_todoist_key', todoistKey);
    if (claudeApiKey) {
      localStorage.setItem('gtd_claude_key', claudeApiKey);
      ClaudeAPI.setKey(claudeApiKey);
      setClaudeKey(claudeApiKey);
    }
    TodoistAPI.setToken(todoistKey);
    setAuthed(true);
  }

  function handleLogout() {
    localStorage.removeItem('gtd_todoist_key');
    localStorage.removeItem('gtd_claude_key');
    setAuthed(false);
    setTasks([]); setProjects([]); setSections([]); setLabels([]);
  }

  // Fetch data
  const fetchAll = useCallback(async () => {
    setLoading(true); setError('');
    try {
      const data = await TodoistAPI.syncAll();
      setTasks(data.tasks); setProjects(data.projects); 
      setSections(data.sections); setLabels(data.labels);
      setLastRefresh(new Date());
    } catch(e) {
      setError(e.message);
      if (e.message.includes('Auth failed')) handleLogout();
    }
    setLoading(false);
  }, []);

  useEffect(() => { if (authed) fetchAll(); }, [authed, fetchAll]);

  // Auto-refresh every 2 minutes
  useEffect(() => {
    if (!authed) return;
    const interval = setInterval(fetchAll, 120000);
    return () => clearInterval(interval);
  }, [authed, fetchAll]);

  // Task actions
  async function handleComplete(id) {
    try {
      await TodoistAPI.completeTask(id);
      setTasks(prev => prev.filter(t => t.id !== id));
      if (selectedTask?.id === id) setSelectedTask(null);
    } catch(e) { setError(e.message); }
  }

  async function handleUpdate(id, data) {
    try {
      await TodoistAPI.updateTask(id, data);
      // Optimistic update for labels
      if (data.labels) {
        setTasks(prev => prev.map(t => t.id === id ? {...t, labels: data.labels} : t));
        if (selectedTask?.id === id) setSelectedTask(prev => ({...prev, labels: data.labels}));
      } else {
        await fetchAll(); // Refresh for other updates
      }
    } catch(e) { setError(e.message); }
  }

  async function handleAdd(data) {
    try {
      const newTask = await TodoistAPI.createTask(data);
      setTasks(prev => [newTask, ...prev]);
    } catch(e) { setError(e.message); }
  }

  // Detect person labels for agenda views
  const personLabels = useMemo(() => {
    const allLabels = new Set();
    tasks.forEach(t => t.labels.forEach(l => { if (isPersonLabel(l)) allLabels.add(l); }));
    return [...allLabels].sort();
  }, [tasks]);

  // Current view
  const isAgenda = view.startsWith('agenda:');
  const agendaPerson = isAgenda ? view.slice(7) : null;

  const filteredTasks = useMemo(() => {
    if (view === 'all_agendas') {
      return tasks.filter(t => t.labels.some(l => isPersonLabel(l)));
    }
    if (isAgenda) {
      return tasks.filter(t => t.labels.includes(agendaPerson));
    }
    const viewDef = VIEWS[view];
    if (!viewDef) return tasks;
    return tasks.filter(viewDef.filter);
  }, [tasks, view, isAgenda, agendaPerson]);

  // Group tasks for agenda views
  const groupedTasks = useMemo(() => {
    if (view === 'all_agendas') {
      const groups = {};
      filteredTasks.forEach(t => {
        t.labels.filter(isPersonLabel).forEach(l => {
          if (!groups[l]) groups[l] = [];
          groups[l].push(t);
        });
      });
      return Object.entries(groups).sort(([a],[b]) => a.localeCompare(b));
    }
    if (view === 'waiting') {
      const withPerson = [];
      const withoutPerson = [];
      filteredTasks.forEach(t => {
        if (t.labels.some(isPersonLabel)) withPerson.push(t);
        else withoutPerson.push(t);
      });
      const groups = [];
      if (withPerson.length > 0) {
        const personGroups = {};
        withPerson.forEach(t => {
          const person = t.labels.find(isPersonLabel) || 'Other';
          if (!personGroups[person]) personGroups[person] = [];
          personGroups[person].push(t);
        });
        Object.entries(personGroups).sort(([a],[b]) => a.localeCompare(b))
          .forEach(([k,v]) => groups.push([`Waiting on ${k}`, v]));
      }
      if (withoutPerson.length > 0) groups.push(['Waiting (general)', withoutPerson]);
      return groups;
    }
    return null;
  }, [filteredTasks, view]);

  const viewName = isAgenda ? `@${agendaPerson}` 
    : view === 'all_agendas' ? 'All agendas'
    : VIEWS[view]?.name || view;

  if (!authed) return <SetupScreen onSave={handleSetup} />;

  return (
    <div style={S.app}>
      {/* Sidebar */}
      <div style={{...S.sidebar, ...(sidebarCollapsed ? S.sidebarCollapsed : {})}}>
        <div style={S.sidebarHeader}>
          <span style={S.logo}>GTD</span>
          <button onClick={() => setSidebarCollapsed(true)}
            style={{color:'var(--text-tertiary)',fontSize:'16px'}}>‹</button>
        </div>
        
        <div style={{flex:1,overflowY:'auto'}}>
          {/* Core views */}
          <div style={S.sidebarSection}>
            <div style={S.sidebarLabel}>Views</div>
            {Object.entries(VIEWS).map(([key, v]) => {
              const count = tasks.filter(v.filter).length;
              return (
                <button key={key} style={S.navItem(view === key)} onClick={() => setView(key)}>
                  <span style={S.navIcon}>{v.icon}</span>
                  <span>{v.name}</span>
                  {count > 0 && <span style={S.navCount}>{count}</span>}
                </button>
              );
            })}
          </div>

          {/* Agenda views */}
          {personLabels.length > 0 && (
            <div style={S.sidebarSection}>
              <div style={S.sidebarLabel}>Agendas</div>
              <button style={S.navItem(view === 'all_agendas')} onClick={() => setView('all_agendas')}>
                <span style={S.navIcon}>◈</span>
                <span>All agendas</span>
                <span style={S.navCount}>
                  {tasks.filter(t => t.labels.some(isPersonLabel)).length}
                </span>
              </button>
              {personLabels.map(p => {
                const count = tasks.filter(t => t.labels.includes(p)).length;
                return (
                  <button key={p} style={S.navItem(view === `agenda:${p}`)} 
                    onClick={() => setView(`agenda:${p}`)}>
                    <span style={S.navIcon}>◇</span>
                    <span>@{p}</span>
                    {count > 0 && <span style={S.navCount}>{count}</span>}
                  </button>
                );
              })}
            </div>
          )}

          {/* Projects */}
          <div style={S.sidebarSection}>
            <div style={S.sidebarLabel}>Projects</div>
            {projects.map(p => {
              const count = tasks.filter(t => t.project_id === p.id).length;
              return (
                <button key={p.id} style={S.navItem(view === `project:${p.id}`)}
                  onClick={() => setView(`project:${p.id}`)}>
                  <span style={{...S.navIcon,fontSize:'10px'}}>●</span>
                  <span>{p.name}</span>
                  {count > 0 && <span style={S.navCount}>{count}</span>}
                </button>
              );
            })}
          </div>
        </div>

        {/* Footer */}
        <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)',fontSize:'11px',
          color:'var(--text-tertiary)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span>{lastRefresh ? `Synced ${lastRefresh.toLocaleTimeString()}` : ''}</span>
          <button onClick={handleLogout} style={{fontSize:'11px',color:'var(--text-tertiary)'}}>
            Logout
          </button>
        </div>
      </div>

      {/* Main content */}
      <div style={S.main}>
        {/* Topbar */}
        <div style={S.topbar}>
          {sidebarCollapsed && (
            <button onClick={() => setSidebarCollapsed(false)}
              style={{color:'var(--text-tertiary)',fontSize:'16px',marginRight:'4px'}}>›</button>
          )}
          <span style={S.topbarTitle}>{viewName}</span>
          <span style={S.topbarCount}>{filteredTasks.length} tasks</span>
          <div style={{flex:1}} />
          <button style={S.btn()} onClick={fetchAll} disabled={loading}>
            {loading ? '↻ Syncing...' : '↻ Refresh'}
          </button>
        </div>

        {error && (
          <div style={{padding:'8px 24px',fontSize:'12px',color:'var(--red)',
            background:'var(--red-dim)'}}>
            {error}
            <button onClick={() => setError('')} style={{marginLeft:'8px',color:'var(--red)'}}>×</button>
          </div>
        )}

        {/* Task list */}
        <div style={{display:'flex',flex:1,overflow:'hidden'}}>
          <div style={S.taskList}>
            {filteredTasks.length === 0 && !loading && (
              <div style={S.emptyState}>
                {view === 'inbox' ? 'Inbox is empty — nicely done' 
                  : view === 'overdue' ? 'Nothing overdue — you\'re on track'
                  : view === 'stale' ? 'No stale items — system is healthy'
                  : 'No tasks match this view'}
              </div>
            )}
            
            {groupedTasks ? (
              groupedTasks.map(([group, groupTasks]) => (
                <div key={group}>
                  <div style={S.groupHeader}>
                    {group} ({groupTasks.length})
                  </div>
                  {groupTasks.map(t => (
                    <TaskItem key={t.id} task={t} onComplete={handleComplete}
                      projects={projects} onSelect={setSelectedTask}
                      selected={selectedTask?.id === t.id} />
                  ))}
                </div>
              ))
            ) : (
              filteredTasks.map(t => (
                <TaskItem key={t.id} task={t} onComplete={handleComplete}
                  projects={projects} onSelect={setSelectedTask}
                  selected={selectedTask?.id === t.id} />
              ))
            )}
          </div>

          {/* Detail panel */}
          {selectedTask && (
            <TaskDetail task={selectedTask} onClose={() => setSelectedTask(null)}
              onComplete={handleComplete} onUpdate={handleUpdate}
              projects={projects} labels={labels} claudeKey={claudeKey} />
          )}
        </div>

        {/* Quick add */}
        <QuickAdd onAdd={handleAdd} labels={labels} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
